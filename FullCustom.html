<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    #pedigree-svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      margin: 0 auto !important;
      background: #fff !important;
      touch-action: none !important;
      -ms-touch-action: none !important;
      user-select: none;
      -webkit-user-select: none;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 340px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-actions button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #menu-save-btn { background: #2f6f86; color: #fff; }
    #menu-print-btn { background: #234a57; color: #fff; }
    #menu-image-btn { background: #4d7c8a; color: #fff; }
    #menu-svg-btn { background: #5d8d99; color: #fff; }
    #reset-styles-btn { background: #eaf2f6; color: #234a57; }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @media print {
      @page { margin: 0; }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
      }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background: white;
      }

      #pedigree-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        background: white;
        overflow: hidden;
      }

      #pedigree-svg {
        width: 100% !important;
        height: 100% !important;
        transform: none !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
      }

      #viewport {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-note">Choose border styles, colors, fonts, layout settings, and rabbit data visibility below.</div>

    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-save-btn" type="button">Save Settings</button>
        <button id="menu-print-btn" type="button">Print/SavePDF-Desktop</button>
        <button id="menu-image-btn" type="button">Save PNG-Mobile</button>
        <button id="menu-svg-btn" type="button">Save SVG-Mobile</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div class="menu-note" id="save-status" style="margin-top:8px; margin-bottom:0;"></div>
    </div>

    <div class="menu-section">
      <label for="border-style">Border Style</label>
      <select id="border-style">
        <option value="classicDouble">Victorian Double Frame</option>
        <option value="elegantCorners">Baroque Corner Flourish</option>
        <option value="ribbonFrame">Heraldic Ribbon Crest</option>
        <option value="royalArch">Cathedral Arch</option>
        <option value="modernGeo">Art Deco Geometric</option>
        <option value="scallop">Pearled Scallop</option>
        <option value="ornateLines">Scrollwork Engraved</option>
        <option value="ticketEdge">Plaque & Notched Frame</option>
        <option value="floralLite">Botanical Vine Border</option>
        <option value="showFrame">Championship Showcase</option>
      </select>

      <label for="border-color-preset" style="margin-top:10px;">Border Color Preset</label>
      <select id="border-color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>
      </select>

      <label for="border-primary-color" style="margin-top:10px;">Border Primary Color</label>
      <input type="color" id="border-primary-color" value="#234a57">

      <label for="border-secondary-color" style="margin-top:10px;">Border Secondary Color</label>
      <input type="color" id="border-secondary-color" value="#d8c79a">
    </div>

    <div class="menu-section">
      <label for="color-preset">Preset Male / Female Pairings</label>
      <select id="color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>
      </select>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Main Rabbit Uses Sex Color</span>
        <input type="checkbox" id="main-sex-color-toggle">
      </div>

      <label for="main-box-color">Main Rabbit Box Color</label>
      <input type="color" id="main-box-color" value="#ffffff">

      <label for="male-box-color">Male Box Color</label>
      <input type="color" id="male-box-color" value="#cce5ff">

      <label for="female-box-color">Female Box Color</label>
      <input type="color" id="female-box-color" value="#f8d7da">
    </div>

    <div class="menu-section">
      <label>Rabbit Box Data Visibility</label>
      <div class="toggle-row">
        <span>DOB</span>
        <input type="checkbox" id="toggle-show-dob" checked>
      </div>
      <div class="toggle-row">
        <span>Ear Length</span>
        <input type="checkbox" id="toggle-show-earl" checked>
      </div>
      <div class="toggle-row">
        <span>Custom</span>
        <input type="checkbox" id="toggle-show-custom" checked>
      </div>
      <div class="toggle-row" style="margin-bottom:0;">
        <span>Wins</span>
        <input type="checkbox" id="toggle-show-wins" checked>
      </div>
    </div>

    <div class="menu-section">
      <label>Font Style</label>
      <div class="font-picker" id="fontPicker">
        <button type="button" class="font-picker-button" id="fontPickerButton">
          <span id="selectedFontPreview" style="font-family: Arial, sans-serif;">Arial</span>
          <span class="font-picker-arrow">▾</span>
        </button>
        <div class="font-picker-dropdown" id="fontPickerDropdown">
          <div class="font-option active" data-font="Arial, sans-serif" style="font-family: Arial, sans-serif;">Arial</div>
          <div class="font-option" data-font="'Poppins', sans-serif" style="font-family: 'Poppins', sans-serif;">Poppins</div>
          <div class="font-option" data-font="'Inter', sans-serif" style="font-family: 'Inter', sans-serif;">Inter</div>
          <div class="font-option" data-font="'Georgia', serif" style="font-family: 'Georgia', serif;">Georgia</div>
          <div class="font-option" data-font="'Times New Roman', serif" style="font-family: 'Times New Roman', serif;">Times New Roman</div>
          <div class="font-option" data-font="'Verdana', sans-serif" style="font-family: 'Verdana', sans-serif;">Verdana</div>
          <div class="font-option" data-font="'Courier New', monospace" style="font-family: 'Courier New', monospace;">Courier New</div>
        </div>
      </div>

      <label for="font-color" style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">

      <label for="box-name-font-size" style="margin-top:10px;">Rabbit Name Font Size</label>
      <input type="range" id="box-name-font-size" min="12" max="22" step="1" value="15">
      <div class="range-readout"><span id="box-name-font-size-value">15</span> px</div>

      <label for="box-body-font-size">Box Body Font Size</label>
      <input type="range" id="box-body-font-size" min="9" max="16" step="1" value="11">
      <div class="range-readout"><span id="box-body-font-size-value">11</span> px</div>
    </div>

    <div class="menu-section">
      <label for="layout-orientation">Pedigree Layout</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>

      <label for="box-width">Box Width</label>
      <input type="range" id="box-width" min="180" max="320" step="5" value="220">
      <div class="range-readout"><span id="box-width-value">220</span> px</div>

      <label for="box-height">Box Height</label>
      <input type="range" id="box-height" min="110" max="190" step="5" value="125">
      <div class="range-readout"><span id="box-height-value">125</span> px</div>
    </div>

    <div class="menu-section">
      <label for="line-style">Pedigree Line Style</label>
      <select id="line-style">
        <option value="diagonal">Diagonal</option>
        <option value="tree">Standard Tree</option>
      </select>

      <label for="line-color">Line Color</label>
      <input type="color" id="line-color" value="#000000">

      <label for="line-thickness">Line Thickness</label>
      <input type="range" id="line-thickness" min="1" max="6" step="0.5" value="1.5">
      <div class="range-readout"><span id="line-thickness-value">1.5</span> px</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Watermark</span>
        <input type="checkbox" id="toggle-watermark">
      </div>

      <label for="watermark-opacity">Watermark Opacity</label>
      <input type="range" id="watermark-opacity" min="0.03" max="0.30" step="0.01" value="0.10">
      <div class="range-readout"><span id="watermark-opacity-value">0.10</span></div>

      <label for="watermark-size">Watermark Size</label>
      <input type="range" id="watermark-size" min="25" max="95" step="1" value="55">
      <div class="range-readout"><span id="watermark-size-value">55</span>%</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Rabbit Photo</span>
        <input type="checkbox" id="toggle-rabbit-photo">
      </div>
      <div class="menu-note" style="margin-bottom:0;"><strong></strong></div>
    </div>
  </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport"></g>
    </svg>
  </div>

  <style id="print-page-style">
    @page { size: 11in 8.5in landscape; margin: 0; }
  </style>

      function getSearchParams() {
        let search = window.location.search || "";
        while (search.startsWith("?")) search = search.slice(1);
        return new URLSearchParams(search);
      }

      function refreshParams() {
        params = getSearchParams();
      }

      function base64ToUtf8(str) {
        return decodeURIComponent(
          Array.from(atob(str))
            .map(c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0"))
            .join("")
        );
      }

      function loadPackedParams() {
        const search = new URLSearchParams(window.location.search);
        const packed = search.get("p");

        if (!packed) {
          packedParams = null;
          return;
        }

        try {
          packedParams = JSON.parse(base64ToUtf8(decodeURIComponent(packed)));
        } catch (err) {
          console.error("Failed to decode packed pedigree data:", err);
          packedParams = null;
        }
      }

      function getRawParam(name) {
        if (packedParams && Object.prototype.hasOwnProperty.call(packedParams, name)) {
          return packedParams[name] || "";
        }
        return params.get(name) || "";
      }

      function decodeParam(raw) {
        const urlDecoded = decodeURIComponent(String(raw).replace(/\+/g, " "));
        const ta = document.createElement("textarea");
        ta.innerHTML = urlDecoded;
        return ta.value;
      }

      function getParam(name) {
        return decodeParam(getRawParam(name));
      }

      function getUrlParam(name) {
        const raw = getRawParam(name);
        return raw ? decodeURIComponent(raw) : "";
      }

      function getChain(keys) {
        return keys.map(k => getParam(k)).filter(Boolean).join(" ");
      }

      function setPrintPage() {
        if (layoutOrientation.value === "portrait") {
          printPageStyle.textContent = "@page { size: 8.5in 11in portrait; margin: 0; }";
        } else {
          printPageStyle.textContent = "@page { size: 11in 8.5in landscape; margin: 0; }";
        }
      }

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "href") {
            el.setAttributeNS(xlinkNS, "xlink:href", v);
            el.setAttribute("href", v);
          } else {
            el.setAttribute(k, v);
          }
        });
        return el;
      }

      function addText(group, x, y, text, opts = {}) {
        const t = makeEl("text", { x, y, "text-anchor": opts.anchor || "start" });
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = (opts.size || 14) + "px";
        if (opts.weight) t.style.fontWeight = opts.weight;
        t.textContent = text || "";
        group.appendChild(t);
        return t;
      }

      function clearViewport() {
        while (viewport.firstChild) viewport.removeChild(viewport.firstChild);
      }

      function validBox(vb) {
        return vb && isFinite(vb.width) && vb.width > 0 && isFinite(vb.height) && vb.height > 0;
      }

      function applyViewportTransform() {
        viewport.setAttribute("transform", `translate(${viewState.x} ${viewState.y}) scale(${viewState.scale})`);
      }

      function clampScale(scale) {
        return Math.max(viewState.minScale, Math.min(viewState.maxScale, scale));
      }

      function zoomAtClientPoint(clientX, clientY, newScale) {
        const rect = svg.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        const px = clientX - rect.left;
        const py = clientY - rect.top;
        const oldScale = viewState.scale;
        const scale = clampScale(newScale);

        const svgX = (px - viewState.x) / oldScale;
        const svgY = (py - viewState.y) / oldScale;

        viewState.scale = scale;
        viewState.x = px - svgX * scale;
        viewState.y = py - svgY * scale;

        applyViewportTransform();
      }

      function fitToContainer() {
        const vb = svg.viewBox.baseVal;
        if (!validBox(vb)) return;

        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!cw || !ch) return;

        const scale = Math.min(cw / vb.width, ch / vb.height);
        if (!isFinite(scale) || scale <= 0) return;

        viewState.scale = scale;
        viewState.x = (cw - vb.width * scale) / 2;
        viewState.y = (ch - vb.height * scale) / 2;
        applyViewportTransform();
      }

      function initializeViewIfNeeded() {
        if (initializedView) return;
        fitToContainer();
        initializedView = true;
      }

      function stopMomentum() {
        if (pointerState.raf) {
          cancelAnimationFrame(pointerState.raf);
          pointerState.raf = 0;
        }
      }

      function startMomentum() {
        stopMomentum();

        const friction = 0.92;
        const minVelocity = 0.08;

        function step() {
          pointerState.velocityX *= friction;
          pointerState.velocityY *= friction;

          if (Math.abs(pointerState.velocityX) < minVelocity && Math.abs(pointerState.velocityY) < minVelocity) {
            pointerState.raf = 0;
            return;
          }

          viewState.x += pointerState.velocityX * 16;
          viewState.y += pointerState.velocityY * 16;
          applyViewportTransform();

          pointerState.raf = requestAnimationFrame(step);
        }

        if (Math.abs(pointerState.velocityX) >= minVelocity || Math.abs(pointerState.velocityY) >= minVelocity) {
          pointerState.raf = requestAnimationFrame(step);
        }
      }

      function getDistance(p1, p2) {
        return Math.hypot(p2.x - p1.x, p2.y - p1.y);
      }

      function getMidpoint(p1, p2) {
        return {
          x: (p1.x + p2.x) / 2,
          y: (p1.y + p2.y) / 2
        };
      }

      function resetPointerGestureState() {
        pointerState.panPointerId = null;
        pointerState.isPanning = false;
        pointerState.pinchStartDistance = 0;
        pointerState.pinchStartScale = viewState.scale;
        pointerState.pinchStartMid = null;
        pointerState.pinchStartX = viewState.x;
        pointerState.pinchStartY = viewState.y;
        pointerState.lastMoveTime = 0;
      }

      function wirePanZoom() {
        container.addEventListener("wheel", (e) => {
          e.preventDefault();
          stopMomentum();
          const factor = e.deltaY > 0 ? 0.9 : 1.1;
          zoomAtClientPoint(e.clientX, e.clientY, viewState.scale * factor);
        }, { passive: false });

        svg.addEventListener("pointerdown", (e) => {
          stopMomentum();
          svg.setPointerCapture?.(e.pointerId);
          pointerState.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (pointerState.pointers.size === 1) {
            pointerState.panPointerId = e.pointerId;
            pointerState.isPanning = true;
            pointerState.lastX = e.clientX;
            pointerState.lastY = e.clientY;
            pointerState.velocityX = 0;
            pointerState.velocityY = 0;
            pointerState.lastMoveTime = performance.now();
          }

          if (pointerState.pointers.size === 2) {
            const pts = Array.from(pointerState.pointers.values());
            pointerState.isPanning = false;
            pointerState.panPointerId = null;
            pointerState.pinchStartDistance = getDistance(pts[0], pts[1]);
            pointerState.pinchStartScale = viewState.scale;
            pointerState.pinchStartMid = getMidpoint(pts[0], pts[1]);
            pointerState.pinchStartX = viewState.x;
            pointerState.pinchStartY = viewState.y;
            pointerState.velocityX = 0;
            pointerState.velocityY = 0;
          }
        });

        svg.addEventListener("pointermove", (e) => {
          if (!pointerState.pointers.has(e.pointerId)) return;
          pointerState.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (pointerState.pointers.size === 1 && pointerState.isPanning && pointerState.panPointerId === e.pointerId) {
            const now = performance.now();
            const dt = Math.max(1, now - pointerState.lastMoveTime);
            const dx = e.clientX - pointerState.lastX;
            const dy = e.clientY - pointerState.lastY;

            viewState.x += dx;
            viewState.y += dy;
            applyViewportTransform();

            pointerState.velocityX = dx / dt;
            pointerState.velocityY = dy / dt;
            pointerState.lastX = e.clientX;
            pointerState.lastY = e.clientY;
            pointerState.lastMoveTime = now;
            return;
          }

          if (pointerState.pointers.size === 2) {
            const pts = Array.from(pointerState.pointers.values());
            const mid = getMidpoint(pts[0], pts[1]);
            const dist = getDistance(pts[0], pts[1]);

            if (!pointerState.pinchStartDistance) return;

            const nextScale = clampScale(pointerState.pinchStartScale * (dist / pointerState.pinchStartDistance));
            const startMid = pointerState.pinchStartMid;

            const localX = (startMid.x - pointerState.pinchStartX) / pointerState.pinchStartScale;
            const localY = (startMid.y - pointerState.pinchStartY) / pointerState.pinchStartScale;

            viewState.scale = nextScale;
            viewState.x = mid.x - localX * nextScale;
            viewState.y = mid.y - localY * nextScale;
            applyViewportTransform();
          }
        });

        function endPointer(e) {
          pointerState.pointers.delete(e.pointerId);

          if (pointerState.pointers.size === 0) {
            if (pointerState.isPanning) startMomentum();
            resetPointerGestureState();
          } else if (pointerState.pointers.size === 1) {
            const [id, pt] = Array.from(pointerState.pointers.entries())[0];
            pointerState.panPointerId = id;
            pointerState.isPanning = true;
            pointerState.lastX = pt.x;
            pointerState.lastY = pt.y;
            pointerState.lastMoveTime = performance.now();
            pointerState.pinchStartDistance = 0;
            pointerState.pinchStartMid = null;
          }
        }

        svg.addEventListener("pointerup", endPointer);
        svg.addEventListener("pointercancel", endPointer);
      }

      function getCanvas() {
        return layoutOrientation.value === "portrait"
          ? { width: 1275, height: 1650 }
          : { width: 1650, height: 1275 };
      }

      function getPrintTuning() {
        return layoutOrientation.value === "portrait"
          ? PRINT_TUNING.portrait
          : PRINT_TUNING.landscape;
      }

      function getLayoutMeta() {
        const canvas = getCanvas();
        const t = getPrintTuning();
        const M = t.borderMargin;

        if (layoutOrientation.value === "portrait") {
          return {
            canvas,
            border: { x: M, y: M, w: canvas.width - (M * 2), h: canvas.height - (M * 2) },
            header: { x: t.headerX, y: t.headerY, logoSize: 116, textScale: 1.0, textGap: 22 },

              bottom: t.treeBottom
            },
            footer: {
              x: t.footerX,
              y: t.footerY,
              right: canvas.width - t.footerX,
              taglineY: t.footerTaglineY
            },

            photoSize: { w: 176, h: 142 }
          };
        }

        return {
          canvas,
          border: { x: M, y: M, w: canvas.width - (M * 2), h: canvas.height - (M * 2) },

      function shouldShowField(label) {
        if (label === "DOB") return toggleShowDob.checked;
        if (label === "Ear Length") return toggleShowEarl.checked;
        return true;
      }

      function buildBoxText(def) {
        const lines = [];
        lines.push({ text: getChain(def.titleChain), type: "title" });

        def.fields.forEach(([label, key]) => {
          if (!shouldShowField(label)) return;
          lines.push({ text: `${label}: ${getParam(key)}`, type: "field" });
        });

        if (toggleShowCustom.checked) {
          def.extra.forEach(key => {
            const raw = getParam(key);
            if (!raw) return;
            raw.replace(/\\n/g, "\n").split("\n").forEach(line => {
              if (line.trim()) lines.push({ text: line.trim(), type: "extra" });
            });
          });
        }

        return lines;
      }

      function getLineRenderMetrics(line) {
        const bodySize = Number(boxBodyFontSizeInput.value);
        const nameSize = Number(boxNameFontSizeInput.value);

        if (line.type === "title") {
          return {
            fontSize: nameSize,
            lineHeight: Math.max(nameSize, bodySize + 1),
            weight: "700"
          };
        }

        return {
          fontSize: bodySize,
          lineHeight: Math.max(bodySize, 10),
          weight: "400"
        };
      }

      function fitTextLinesToBox(lines, boxH) {
        const topPadMin = 8;
        const bottomPadMin = 8;
        const usableH = boxH - topPadMin - bottomPadMin;

        let used = 0;
        const visible = [];

        for (const line of lines) {
          const metrics = getLineRenderMetrics(line);
          if (used + metrics.lineHeight > usableH) break;
          visible.push({ ...line, metrics });
          used += metrics.lineHeight;
        }

        const startY = Math.max(topPadMin, (boxH - used) / 2);
        return { visible, startY };
      }

      function drawWins(group, def, x, y, boxW, boxH) {
        if (!toggleShowWins.checked) return;
        if (def.gen >= 4 || !def.wins) return;

        const raw = getParam(def.wins);
        if (!raw) return;

        const lines = raw.replace(/\\n/g, "\n").split("\n").filter(Boolean);
        if (!lines.length) return;

        const size = Math.max(10, Number(boxBodyFontSizeInput.value));
        const textEl = makeEl("text", { x: x + 6, y: y + boxH + 16 });
        textEl.style.fontFamily = getCurrentFont();
        textEl.style.fill = fontColor.value;
        textEl.style.fontSize = size + "px";

        lines.slice(0, 3).forEach((line, i) => {
          const ts = makeEl("tspan", {
            x: x + 6,
            dy: i === 0 ? 0 : size + 2
          });
          ts.textContent = line;
          textEl.appendChild(ts);
        });

        group.appendChild(textEl);
      }

      function drawBox(group, winsLayer, def, x, y, boxW, boxH) {
        const fill = getBoxFill(def.sexType);

        group.appendChild(makeEl("rect", {
          x, y, width: boxW, height: boxH, rx: 8, ry: 8,
          fill, stroke: "#000000", "stroke-width": 1.1
        }));

        const textLines = buildBoxText(def);
        const fitted = fitTextLinesToBox(textLines, boxH);
        const padX = 8;

        const t = makeEl("text", {
          x: x + padX,
          y: y + fitted.startY
        });

        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.setAttribute("dominant-baseline", "hanging");

        let currentY = y + fitted.startY;

        fitted.visible.forEach((line) => {
          const ts = makeEl("tspan", {
            x: x + padX,
            y: currentY
          });
          ts.textContent = line.text;
          ts.style.fontSize = line.metrics.fontSize + "px";
          ts.style.fontWeight = line.metrics.weight;
          ts.setAttribute("dominant-baseline", "hanging");
          t.appendChild(ts);

          currentY += line.metrics.lineHeight;
        });

        group.appendChild(t);
        drawWins(winsLayer, def, x, y, boxW, boxH);
      }

      function drawLine(group, childPos, parentPos, boxW, boxH) {
        const stroke = lineColorInput.value;
        const sw = lineThicknessInput.value;
        const style = lineStyleInput.value;

        const p1 = { x: childPos.x + boxW, y: childPos.y + boxH / 2 };
        const p2 = { x: parentPos.x, y: parentPos.y + boxH / 2 };

        if (style === "diagonal") {
          group.appendChild(makeEl("line", {
            x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
            stroke, "stroke-width": sw
          }));
        } else {
          const midX = (p1.x + p2.x) / 2;
          group.appendChild(makeEl("path", {
            d: `M ${p1.x} ${p1.y} L ${midX} ${p1.y} L ${midX} ${p2.y} L ${p2.x} ${p2.y}`,
            fill: "none", stroke, "stroke-width": sw
          }));
        }
      }

      function getPositions(boxW, boxH) {
        const meta = getLayoutMeta();
        const tree = meta.tree;
        const isPortrait = layoutOrientation.value === "portrait";

        const usableWidth = tree.right - tree.left;
        const gapX = Math.max(isPortrait ? 4 : 8, (usableWidth - (boxW * 4)) / 3);

        const x1 = tree.left;
        const x2 = x1 + boxW + gapX;
        const x3 = x2 + boxW + gapX;
        const x4 = x3 + boxW + gapX;

        const usableHeight = tree.bottom - tree.top;
        const gap4 = Math.max(isPortrait ? 4 : 6, (usableHeight - (boxH * 8)) / 7);

        const gen4 = [];
        for (let i = 0; i < 8; i++) {
          gen4.push(tree.top + i * (boxH + gap4));
        }

        const centerY = (boxTop) => boxTop + (boxH / 2);
        const topFromCenter = (center) => center - (boxH / 2);

        const ssireY = topFromCenter((centerY(gen4[0]) + centerY(gen4[1])) / 2);
        const sdamY  = topFromCenter((centerY(gen4[2]) + centerY(gen4[3])) / 2);
        const dsireY = topFromCenter((centerY(gen4[4]) + centerY(gen4[5])) / 2);
        const ddamY  = topFromCenter((centerY(gen4[6]) + centerY(gen4[7])) / 2);

        const sireY = topFromCenter((centerY(ssireY) + centerY(sdamY)) / 2);
        const damY  = topFromCenter((centerY(dsireY) + centerY(ddamY)) / 2);
        const mainY = topFromCenter((centerY(sireY) + centerY(damY)) / 2);

        return {
          main:   { x: x1, y: mainY },
          sire:   { x: x2, y: sireY },
          dam:    { x: x2, y: damY },
          ssire:  { x: x3, y: ssireY },
          sdam:   { x: x3, y: sdamY },
          dsire:  { x: x3, y: dsireY },
          ddam:   { x: x3, y: ddamY },
          sssire: { x: x4, y: gen4[0] },
          ssdam:  { x: x4, y: gen4[1] },
          sdsire: { x: x4, y: gen4[2] },
          sddam:  { x: x4, y: gen4[3] },
          dssire: { x: x4, y: gen4[4] },
          dsdam:  { x: x4, y: gen4[5] },
          ddsire: { x: x4, y: gen4[6] },
          dddam:  { x: x4, y: gen4[7] }
        };
      }

      function render(keepZoom = true) {
        refreshParams();

        renderNonce += 1;
        const myNonce = renderNonce;

        clearViewport();

        const meta = getLayoutMeta();
        const canvas = meta.canvas;
        let boxW = Number(boxWidthInput.value);
        let boxH = Number(boxHeightInput.value);

        if (layoutOrientation.value === "portrait") {
          boxW = Math.min(boxW, 280);
          if (Number(boxWidthInput.value) !== boxW) boxWidthInput.value = boxW;
        } else {
          boxW = Math.min(boxW, 300);
          if (Number(boxWidthInput.value) !== boxW) boxWidthInput.value = boxW;
        }

        const positions = getPositions(boxW, boxH);

        svg.setAttribute("viewBox", `0 0 ${canvas.width} ${canvas.height}`);
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        boxWidthValue.textContent = boxW;
        boxHeightValue.textContent = boxH;
        boxNameFontSizeValue.textContent = boxNameFontSizeInput.value;
        boxBodyFontSizeValue.textContent = boxBodyFontSizeInput.value;
        lineThicknessValue.textContent = lineThicknessInput.value;
        watermarkOpacityValue.textContent = Number(watermarkOpacity.value).toFixed(2);
        watermarkSizeValue.textContent = watermarkSize.value;

        setPrintPage();

        const borderLayer = makeEl("g");
        const watermarkLayer = makeEl("g");
        const headerLayer = makeEl("g");
        const lineLayer = makeEl("g");
        const photoLayer = makeEl("g");
        const boxLayer = makeEl("g");
        const winsLayer = makeEl("g");
        const footerLayer = makeEl("g");

        viewport.append(borderLayer, watermarkLayer, headerLayer, lineLayer, photoLayer, boxLayer, winsLayer, footerLayer);

        drawBorder(borderLayer, meta);

        const logoUrl = getUrlParam("logo");

        if (logoUrl && toggleWatermark.checked) {
          const pct = Number(watermarkSize.value) / 100;
          const wmBase = Math.min(canvas.width, canvas.height) * pct;
          const wmX = (canvas.width - wmBase) / 2;
          const wmY = (canvas.height - wmBase) / 2;

          const wm = makeEl("image", {
            href: logoUrl,
            x: wmX,
            y: wmY,
            width: wmBase,
            height: wmBase,
            preserveAspectRatio: "xMidYMid meet",
            opacity: watermarkOpacity.value
          });
          wm.style.pointerEvents = "none";
          watermarkLayer.appendChild(wm);
        }

        if (logoUrl) {
          headerLayer.appendChild(makeEl("image", {
            href: logoUrl,
            x: meta.header.x,
            y: meta.header.y,
            width: meta.header.logoSize,
            height: meta.header.logoSize,
            preserveAspectRatio: "xMidYMid meet"
          }));
        }

        const hs = meta.header.textScale;
        const headerTextX = meta.header.x + meta.header.logoSize + meta.header.textGap;
        const headerTextY = meta.header.y + 20;

        addText(headerLayer, headerTextX, headerTextY + 0, getParam("rabbitry"), { size: 24 * hs, weight: 700 });
        addText(headerLayer, headerTextX, headerTextY + 24 * hs, getParam("street"), { size: 17 * hs, weight: 600 });
        addText(headerLayer, headerTextX, headerTextY + 46 * hs, [getParam("city"), getParam("state"), getParam("zip")].filter(Boolean).join(" "), { size: 17 * hs, weight: 600 });
        addText(headerLayer, headerTextX, headerTextY + 68 * hs, getParam("phone"), { size: 17 * hs, weight: 600 });
        addText(headerLayer, headerTextX, headerTextY + 90 * hs, getParam("email"), { size: 17 * hs, weight: 600 });
        addText(headerLayer, headerTextX, headerTextY + 118 * hs, "Breed:", { size: 17 * hs, weight: 700 });
        addText(headerLayer, headerTextX + 68 * hs, headerTextY + 118 * hs, getParam("breed"), { size: 17 * hs, weight: 700 });
        addText(headerLayer, headerTextX, headerTextY + 140 * hs, "DOB:", { size: 17 * hs, weight: 700 });
        addText(headerLayer, headerTextX + 68 * hs, headerTextY + 140 * hs, getParam("dob"), { size: 17 * hs, weight: 700 });

        if (toggleRabbitPhoto.checked && getUrlParam("rabbitphoto")) {
          const main = positions.main;
          const photoW = Math.min(boxW - 30, meta.photoSize.w);
          const photoH = meta.photoSize.h;
          const photoX = main.x + (boxW - photoW) / 2;
          const photoY = main.y - photoH - meta.photoGap;

          const clipId = "rabbit-photo-clip";
          const defs = makeEl("defs");
          const clip = makeEl("clipPath", { id: clipId });
          clip.appendChild(makeEl("rect", {
            x: photoX, y: photoY, width: photoW, height: photoH, rx: 10, ry: 10
          }));
          defs.appendChild(clip);
          photoLayer.appendChild(defs);

          photoLayer.appendChild(makeEl("rect", {
            x: photoX, y: photoY, width: photoW, height: photoH, rx: 10, ry: 10,
            fill: "#ffffff", stroke: "#000000", "stroke-width": 1.3
          }));

          photoLayer.appendChild(makeEl("image", {
            href: getUrlParam("rabbitphoto"),
            x: photoX, y: photoY, width: photoW, height: photoH,
            preserveAspectRatio: "xMidYMid slice",
            "clip-path": `url(#${clipId})`
          }));
        }

        parentMap.forEach(([childId, parentId]) => {
          drawLine(lineLayer, positions[childId], positions[parentId], boxW, boxH);
        });

        boxDefs.forEach(def => {
          drawBox(boxLayer, winsLayer, def, positions[def.id].x, positions[def.id].y, boxW, boxH);
        });

        const footerX = meta.footer.x;
        const footerY = meta.footer.y;
        const sigUrl = getUrlParam("signature");

        addText(footerLayer, footerX, footerY - 48, "I hereby certify that this pedigree is correct to the best of my knowledge.", { size: 13, weight: 600 });

        footerLayer.appendChild(makeEl("line", {
          x1: footerX, y1: footerY + 8, x2: footerX + 285, y2: footerY + 8,
          stroke: "#000000", "stroke-width": 1
        }));

        if (sigUrl) {
          footerLayer.appendChild(makeEl("image", {
            href: sigUrl,
            x: footerX,
            y: footerY - 34,
            width: 84,
            height: 54,
            preserveAspectRatio: "xMidYMid meet"
          }));
        }

        addText(footerLayer, footerX, footerY + 28, getParam("owner"), { size: 14, weight: 700 });

        addText(
          footerLayer,
          meta.canvas.width / 2,
          meta.footer.taglineY,
          "Pedigree built on the ShowTails LLC platform - www.showtails.com",
          { size: 11, anchor: "middle" }
        );

        requestAnimationFrame(() => {
          if (myNonce !== renderNonce) return;

          applyViewportTransform();

          if (!initializedView) {
            initializeViewIfNeeded();
          }
        });
      }

      async function inlineExternalImagesForExport(targetSvg) {
        const imageNodes = Array.from(targetSvg.querySelectorAll("image"));
        const promises = imageNodes.map((img) => {
          const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
          if (!href || href.startsWith("data:")) return Promise.resolve();

          return fetch(href, { mode: "cors" })
            .then(res => {
              if (!res.ok) throw new Error("Image fetch failed");
              return res.blob();
            })
            .then(blob => new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => {
                img.setAttribute("href", reader.result);
                img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", reader.result);
                resolve();
              };
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            }))
            .catch(() => {});
        });

        return Promise.all(promises);
      }

      async function buildStaticExportSvg() {
        const svgClone = svg.cloneNode(true);
        svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        svgClone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

        const vb = svg.getAttribute("viewBox");
        if (vb) svgClone.setAttribute("viewBox", vb);

        const canvas = getCanvas();
        svgClone.setAttribute("width", String(canvas.width));
        svgClone.setAttribute("height", String(canvas.height));
        svgClone.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const vp = svgClone.querySelector("#viewport");
        if (vp) {
          vp.removeAttribute("transform");
          vp.style.transform = "none";
        }

        svgClone.style.transform = "none";
        svgClone.style.background = "#ffffff";
        svgClone.style.display = "block";

        await inlineExternalImagesForExport(svgClone);
        return svgClone;
      }

      async function buildPrintImageDataUrl() {
        const svgClone = await buildStaticExportSvg();
        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svgClone);
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const canvasSize = getCanvas();
        const exportScale = 2;

        return await new Promise((resolve, reject) => {
          const img = new Image();

          img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = canvasSize.width * exportScale;
            canvas.height = canvasSize.height * exportScale;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL("image/png"));
          };

          img.onerror = function () {
            URL.revokeObjectURL(url);
            reject(new Error("Unable to rasterize print image."));
          };

          img.src = url;
        });
      }

      function getFileBaseName() {
        return (getParam("name") || "pedigree")
          .replace(/[^\w\-]+/g, "_")
          .replace(/^_+|_+$/g, "") || "pedigree";
      }

      async function saveSvgFile() {
        saveStatus.textContent = "Preparing SVG...";
        try {
          const serializer = new XMLSerializer();
          const svgClone = await buildStaticExportSvg();
          const svgString = serializer.serializeToString(svgClone);
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = `${getFileBaseName()}.svg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          setTimeout(() => URL.revokeObjectURL(url), 1000);
          saveStatus.textContent = "SVG saved.";
        } catch (err) {
          saveStatus.textContent = "Unable to save SVG.";
        }
      }

      async function saveSvgAsPng() {
        saveStatus.textContent = "Preparing PNG...";
        try {
          const serializer = new XMLSerializer();
          const svgClone = await buildStaticExportSvg();
          const svgString = serializer.serializeToString(svgClone);
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);

          const canvasSize = getCanvas();
          const exportScale = 2;

          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = canvasSize.width * exportScale;
            canvas.height = canvasSize.height * exportScale;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            URL.revokeObjectURL(url);

            canvas.toBlob(function (pngBlob) {
              if (!pngBlob) {
                saveStatus.textContent = "Could not create PNG.";
                return;
              }

              const a = document.createElement("a");
              const pngUrl = URL.createObjectURL(pngBlob);

              a.href = pngUrl;
              a.download = `${getFileBaseName()}.png`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);

              setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
              saveStatus.textContent = "PNG saved.";
            }, "image/png");
          };

          img.onerror = function () {
            URL.revokeObjectURL(url);
            saveStatus.textContent = "Unable to save PNG. One or more external images may be blocking export.";
          };

          img.src = url;
        } catch (err) {
          saveStatus.textContent = "Unable to save PNG.";
        }
      }

      async function runPrintFlow() {
        const status = document.getElementById("save-status");
        if (status) status.textContent = "Preparing full-page print...";

        try {
          const isPortrait = document.getElementById("layout-orientation").value === "portrait";
          const printImageUrl = await buildPrintImageDataUrl();

          const pWin = window.open("", "_blank");
          if (!pWin) {
            if (status) status.textContent = "Please allow pop-ups to print.";
            return;
          }

          pWin.document.open();
          pWin.document.write(`
            <!DOCTYPE html>
            <html>
              <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
                <title>Rabbit Pedigree Print</title>
                <style>
                  @page {
                    size: ${isPortrait ? "8.5in 11in portrait" : "11in 8.5in landscape"};
                    margin: 0;
                  }

                  html, body {
                    margin: 0;
                    padding: 0;
                    width: 100%;
                    height: 100%;
                    background: #fff;
                    overflow: hidden;
                  }

                  body {
                    position: fixed;
                    inset: 0;
                    background: #fff;
                  }

                  .print-page {
                    position: fixed;
                    inset: 0;
                    width: 100vw;
                    height: 100vh;
                    background: #fff;
                    overflow: hidden;
                  }

                  .print-page img {
                    display: block;
                    width: 100vw;
                    height: 100vh;
                    object-fit: fill;
                    background: #fff;
                  }
                </style>
              </head>
              <body>
                <div class="print-page">
                  <img src="${printImageUrl}" alt="Rabbit Pedigree Print">
                </div>
              </body>
            </html>
          `);
          pWin.document.close();

          pWin.onload = () => {
            setTimeout(() => {
              pWin.focus();
              pWin.print();
              if (status) status.textContent = "";
            }, 700);
          };
        } catch (err) {
          if (status) status.textContent = "Unable to prepare print.";
        }
      }

      function applyPresetIfNeeded() {
        const selected = colorPreset.value;
        if (selected === "custom") return;
        const preset = presets[selected];
        if (!preset) return;
        maleBoxColor.value = preset.male;
        femaleBoxColor.value = preset.female;
        mainBoxColor.value = preset.main;
      }

      function applyBorderPresetIfNeeded() {
        const selected = borderColorPreset.value;
        if (selected === "custom") return;
        const preset = borderPresets[selected];
        if (!preset) return;
        borderPrimaryColor.value = preset.primary;
        borderSecondaryColor.value = preset.secondary;
      }

      function resetDefaults(shouldRender = true) {
        borderStyleInput.value = defaults.borderStyle;
        borderColorPreset.value = defaults.borderColorPreset;
        borderPrimaryColor.value = defaults.borderPrimary;
        borderSecondaryColor.value = defaults.borderSecondary;
        colorPreset.value = defaults.preset;
        mainSexColorToggle.checked = defaults.mainSexColor;
        mainBoxColor.value = defaults.main;
        maleBoxColor.value = defaults.male;
        femaleBoxColor.value = defaults.female;
        toggleShowDob.checked = defaults.showDob;
        toggleShowEarl.checked = defaults.showEarl;
        toggleShowCustom.checked = defaults.showCustom;
        toggleShowWins.checked = defaults.showWins;
        fontColor.value = defaults.fontColor;
        layoutOrientation.value = defaults.layout;
        boxWidthInput.value = defaults.boxWidth;
        boxHeightInput.value = defaults.boxHeight;
        boxNameFontSizeInput.value = defaults.nameFont;
        boxBodyFontSizeInput.value = defaults.bodyFont;
        lineStyleInput.value = defaults.lineStyle;
        lineColorInput.value = defaults.lineColor;
        lineThicknessInput.value = defaults.lineThickness;
        toggleWatermark.checked = defaults.watermarkEnabled;
        watermarkOpacity.value = defaults.watermarkOpacity;
        watermarkSize.value = defaults.watermarkSize;
        toggleRabbitPhoto.checked = defaults.rabbitPhotoEnabled;
        saveStatus.textContent = "";
        applyFont(defaults.fontFamily, false);

        if (shouldRender) render(false);
      }

      menuToggle.addEventListener("click", () => {
        pedigreeMenu.classList.toggle("open");
      });

      document.addEventListener("click", (event) => {
        if (!pedigreeMenu.contains(event.target) && event.target !== menuToggle) {
          pedigreeMenu.classList.remove("open");
        }
      });

      fontPickerButton.addEventListener("click", (e) => {
        e.stopPropagation();
        fontPicker.classList.toggle("open");
      });

      fontOptions.forEach(option => {
        option.addEventListener("click", () => {
          applyFont(option.dataset.font, false);
          render(true);
          fontPicker.classList.remove("open");
        });
      });

      document.addEventListener("click", (event) => {
        if (!fontPicker.contains(event.target)) {
          fontPicker.classList.remove("open");
        }
      });

      colorPreset.addEventListener("change", () => {
        applyPresetIfNeeded();
        render(true);
      });

      borderColorPreset.addEventListener("change", () => {
        applyBorderPresetIfNeeded();
        render(true);
      });

      [
        borderStyleInput,
        borderPrimaryColor,
        borderSecondaryColor,
        mainSexColorToggle,
        mainBoxColor,
        maleBoxColor,
        femaleBoxColor,
        toggleShowDob,
        toggleShowEarl,
        toggleShowCustom,
        toggleShowWins,
        fontColor,
        boxWidthInput,
        boxHeightInput,
        boxNameFontSizeInput,
        boxBodyFontSizeInput,
        lineStyleInput,
        lineColorInput,
        lineThicknessInput,
        toggleWatermark,
        watermarkOpacity,
        watermarkSize,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("input", () => render(true)));

      [
        mainSexColorToggle,
        toggleShowDob,
        toggleShowEarl,
        toggleShowCustom,
        toggleShowWins,
        toggleWatermark,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("change", () => render(true)));

      layoutOrientation.addEventListener("change", () => render(true));

      [borderPrimaryColor, borderSecondaryColor].forEach(el => {
        el.addEventListener("input", () => {
          borderColorPreset.value = "custom";
        });
      });

      [mainBoxColor, maleBoxColor, femaleBoxColor].forEach(el => {
        el.addEventListener("input", () => {
          colorPreset.value = "custom";
        });
      });

      saveBtn.addEventListener("click", saveSettingsToShowTails);
      resetStylesBtn.addEventListener("click", () => resetDefaults(true));
      printBtn.addEventListener("click", runPrintFlow);
      imageBtn.addEventListener("click", saveSvgAsPng);
      svgBtn.addEventListener("click", saveSvgFile);

      let lastContainerSize = { width: 0, height: 0 };

      const ro = new ResizeObserver(() => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        if (!width || !height) return;

        const sizeChanged = width !== lastContainerSize.width || height !== lastContainerSize.height;
        lastContainerSize = { width, height };

        if (!sizeChanged) return;
        if (!initializedView) return;

        applyViewportTransform();
      });
      ro.observe(container);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible") return;
        if (!initializedView) return;
        applyViewportTransform();
      });

      wirePanZoom();

      window.addEventListener("load", () => {
        refreshParams();
        loadPackedParams();
        resetDefaults(false);

        const savedSettings = getSavedSettingsFromUrl();
        if (savedSettings) {
          applySettings(savedSettings, false);
        }

        render(false);
      });
    })();
  </script>
