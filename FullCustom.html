<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    #pedigree-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 310px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    #menu-print-btn {
      background: #234a57;
      color: #fff;
    }

    #reset-styles-btn {
      background: #eaf2f6;
      color: #234a57;
    }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @media print {
      html, body, #pedigree-container {
        width: 100%;
        height: 100%;
        overflow: hidden !important;
        background: #fff;
      }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
        visibility: hidden !important;
      }

      #pedigree-svg {
        width: 100% !important;
        height: 100% !important;
      }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-note">Choose a preset or fine-tune colors below.</div>

    <div class="menu-section">
      <label for="color-preset">Preset Male / Female Pairings</label>
      <select id="color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Mauve</option>
      </select>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Main Rabbit Uses Sex Color</span>
        <input type="checkbox" id="main-sex-color-toggle">
      </div>

      <label for="main-box-color">Main Rabbit Box Color</label>
      <input type="color" id="main-box-color" value="#ffffff">

      <label for="male-box-color">Male Box Color</label>
      <input type="color" id="male-box-color" value="#cce5ff">

      <label for="female-box-color">Female Box Color</label>
      <input type="color" id="female-box-color" value="#f8d7da">
    </div>

    <div class="menu-section">
      <label>Font Style</label>
      <div class="font-picker" id="fontPicker">
        <button type="button" class="font-picker-button" id="fontPickerButton">
          <span id="selectedFontPreview" style="font-family: Arial, sans-serif;">Arial</span>
          <span class="font-picker-arrow">▾</span>
        </button>
        <div class="font-picker-dropdown" id="fontPickerDropdown">
          <div class="font-option active" data-font="Arial, sans-serif" style="font-family: Arial, sans-serif;">Arial</div>
          <div class="font-option" data-font="'Poppins', sans-serif" style="font-family: 'Poppins', sans-serif;">Poppins</div>
          <div class="font-option" data-font="'Inter', sans-serif" style="font-family: 'Inter', sans-serif;">Inter</div>
          <div class="font-option" data-font="'Georgia', serif" style="font-family: 'Georgia', serif;">Georgia</div>
          <div class="font-option" data-font="'Times New Roman', serif" style="font-family: 'Times New Roman', serif;">Times New Roman</div>
          <div class="font-option" data-font="'Verdana', sans-serif" style="font-family: 'Verdana', sans-serif;">Verdana</div>
          <div class="font-option" data-font="'Courier New', monospace" style="font-family: 'Courier New', monospace;">Courier New</div>
        </div>
      </div>

      <label for="font-color" style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">
    </div>

    <div class="menu-section">
      <label for="layout-orientation">Pedigree Layout</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>

      <label for="box-width">Box Width</label>
      <input type="range" id="box-width" min="180" max="340" step="5" value="240">
      <div class="range-readout"><span id="box-width-value">240</span> px</div>

      <label for="box-height">Box Height</label>
      <input type="range" id="box-height" min="110" max="220" step="5" value="140">
      <div class="range-readout"><span id="box-height-value">140</span> px</div>
    </div>

    <div class="menu-section">
      <label for="line-style">Pedigree Line Style</label>
      <select id="line-style">
        <option value="diagonal">Diagonal</option>
        <option value="tree">Standard Tree</option>
      </select>

      <label for="line-color">Line Color</label>
      <input type="color" id="line-color" value="#000000">

      <label for="line-thickness">Line Thickness</label>
      <input type="range" id="line-thickness" min="1" max="6" step="0.5" value="1.5">
      <div class="range-readout"><span id="line-thickness-value">1.5</span> px</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Watermark</span>
        <input type="checkbox" id="toggle-watermark">
      </div>

      <label for="watermark-opacity">Watermark Opacity</label>
      <input type="range" id="watermark-opacity" min="0.03" max="0.30" step="0.01" value="0.10">
      <div class="range-readout"><span id="watermark-opacity-value">0.10</span></div>

      <label for="watermark-size">Watermark Size</label>
      <input type="range" id="watermark-size" min="25" max="95" step="1" value="55">
      <div class="range-readout"><span id="watermark-size-value">55</span>%</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Rabbit Photo</span>
        <input type="checkbox" id="toggle-rabbit-photo">
      </div>
      <div class="menu-note" style="margin-bottom:0;">Image query parameter: <strong>rabbitphoto</strong></div>
    </div>

    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-print-btn" type="button">Print / Save PDF</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
    </div>
  </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <style id="print-page-style">
    @page { size: 11in 8.5in landscape; margin: 0; }
  </style>

  <script>
    (function () {
      const svgNS = "http://www.w3.org/2000/svg";
      const xlinkNS = "http://www.w3.org/1999/xlink";

      const svg = document.getElementById("pedigree-svg");
      const menuToggle = document.getElementById("menu-toggle");
      const pedigreeMenu = document.getElementById("pedigree-menu");
      const printPageStyle = document.getElementById("print-page-style");

      const colorPreset = document.getElementById("color-preset");
      const mainSexColorToggle = document.getElementById("main-sex-color-toggle");
      const mainBoxColor = document.getElementById("main-box-color");
      const maleBoxColor = document.getElementById("male-box-color");
      const femaleBoxColor = document.getElementById("female-box-color");
      const fontColor = document.getElementById("font-color");
      const layoutOrientation = document.getElementById("layout-orientation");
      const boxWidthInput = document.getElementById("box-width");
      const boxHeightInput = document.getElementById("box-height");
      const boxWidthValue = document.getElementById("box-width-value");
      const boxHeightValue = document.getElementById("box-height-value");
      const lineStyleInput = document.getElementById("line-style");
      const lineColorInput = document.getElementById("line-color");
      const lineThicknessInput = document.getElementById("line-thickness");
      const lineThicknessValue = document.getElementById("line-thickness-value");
      const toggleWatermark = document.getElementById("toggle-watermark");
      const watermarkOpacity = document.getElementById("watermark-opacity");
      const watermarkSize = document.getElementById("watermark-size");
      const watermarkOpacityValue = document.getElementById("watermark-opacity-value");
      const watermarkSizeValue = document.getElementById("watermark-size-value");
      const toggleRabbitPhoto = document.getElementById("toggle-rabbit-photo");
      const resetStylesBtn = document.getElementById("reset-styles-btn");
      const printBtn = document.getElementById("menu-print-btn");

      const fontPicker = document.getElementById("fontPicker");
      const fontPickerButton = document.getElementById("fontPickerButton");
      const selectedFontPreview = document.getElementById("selectedFontPreview");
      const fontOptions = document.querySelectorAll(".font-option");

      const params = new URLSearchParams(window.location.search);

      const defaults = {
        preset: "custom",
        mainSexColor: false,
        main: "#ffffff",
        male: "#cce5ff",
        female: "#f8d7da",
        fontColor: "#000000",
        fontFamily: "Arial, sans-serif",
        layout: "landscape",
        boxWidth: 240,
        boxHeight: 140,
        lineStyle: "diagonal",
        lineColor: "#000000",
        lineThickness: 1.5,
        watermarkEnabled: false,
        watermarkOpacity: 0.10,
        watermarkSize: 55,
        rabbitPhotoEnabled: false
      };

      const presets = {
        classicBluePink: { male: "#cce5ff", female: "#f8d7da", main: "#ffffff" },
        navyBlush:      { male: "#b8cbe6", female: "#f1d0db", main: "#f9fbfd" },
        sagePeach:      { male: "#cfe1d0", female: "#f7d7c3", main: "#fffaf3" },
        tealLavender:   { male: "#bfe4e8", female: "#ddd0f1", main: "#f8fcfd" },
        steelRose:      { male: "#ccd6e3", female: "#efc9d2", main: "#fbfbfc" },
        iceCoral:       { male: "#d7eefb", female: "#f8cfc4", main: "#fffdfb" },
        forestCream:    { male: "#cad8c7", female: "#f2e8d2", main: "#fffdf7" },
        showtails:      { male: "#cfe6ef", female: "#eadde9", main: "#eef7fa" }
      };

      const boxDefs = [
        { id: "main", sexType: "main", titleChain: ["crabbitry","name"], fields: [["Color","color"],["Ear#","ear number"],["Weight","weight"],["Sex","sex"],["Legs","legs"],["Reg#","reg"],["GC#","gc"]], extra: ["custom","win1"] },
        { id: "sire", sexType: "male", titleChain: ["srabbitry","sire"], fields: [["Color","scolor"],["Ear#","sear"],["Weight","sweight"],["Sex","ssex"],["Legs","slegs"],["Reg#","sreg"],["GC#","sgc"]], extra: ["scustom","swin1"] },
        { id: "dam", sexType: "female", titleChain: ["drabbitry","dam"], fields: [["Color","dcolor"],["Ear#","dear"],["Weight","dweight"],["Sex","dsex"],["Legs","dlegs"],["Reg#","dreg"],["GC#","dgc"]], extra: ["dcustom","dwin1"] },

        { id: "ssire", sexType: "male", titleChain: ["ssrabbitry","ssire"], fields: [["Color","sscolor"],["Ear#","ssear"],["Weight","ssweight"],["Sex","sssex"],["Legs","sslegs"],["Reg#","ssreg"],["GC#","ssgc"]], extra: ["sscustom","sswin1"] },
        { id: "sdam", sexType: "female", titleChain: ["sdrabbitry","sdam"], fields: [["Color","sdcolor"],["Ear#","sdear"],["Weight","sdweight"],["Sex","sdsex"],["Legs","sdlegs"],["Reg#","sdreg"],["GC#","sdgc"]], extra: ["sdcustom","sdwin1"] },
        { id: "dsire", sexType: "male", titleChain: ["dsrabbitry","dsire"], fields: [["Color","dscolor"],["Ear#","dsear"],["Weight","dsweight"],["Sex","dssex"],["Legs","dslegs"],["Reg#","dsreg"],["GC#","dsgc"]], extra: ["dscustom","dswin1"] },
        { id: "ddam", sexType: "female", titleChain: ["ddrabbitry","ddam"], fields: [["Color","ddcolor"],["Ear#","ddear"],["Weight","ddweight"],["Sex","ddsex"],["Legs","ddlegs"],["Reg#","ddreg"],["GC#","ddgc"]], extra: ["ddcustom","ddwin1"] },

        { id: "sssire", sexType: "male", titleChain: ["sssrabbitry","sssire"], fields: [["Color","ssscolor"],["Ear#","sssear"],["Weight","sssweight"],["Sex","ssssex"],["Legs","ssslegs"],["Reg#","sssreg"],["GC#","sssgc"]], extra: ["ssscustom"] },
        { id: "ssdam", sexType: "female", titleChain: ["ssdrabbitry","ssdam"], fields: [["Color","ssdcolor"],["Ear#","ssdear"],["Weight","ssdweight"],["Sex","ssdsex"],["Legs","ssdlegs"],["Reg#","ssdreg"],["GC#","ssdgc"]], extra: ["ssdcustom"] },
        { id: "sdsire", sexType: "male", titleChain: ["sdsrabbitry","sdsire"], fields: [["Color","sdscolor"],["Ear#","sdsear"],["Weight","sdsweight"],["Sex","sdssex"],["Legs","sdslegs"],["Reg#","sdsreg"],["GC#","sdsgc"]], extra: ["sdscustom"] },
        { id: "sddam", sexType: "female", titleChain: ["sddrabbitry","sddam"], fields: [["Color","sddcolor"],["Ear#","sddear"],["Weight","sddweight"],["Sex","sddsex"],["Legs","sddlegs"],["Reg#","sddreg"],["GC#","sddgc"]], extra: ["sddcustom"] },
        { id: "dssire", sexType: "male", titleChain: ["dssrabbitry","dssire"], fields: [["Color","dsscolor"],["Ear#","dssear"],["Weight","dssweight"],["Sex","dsssex"],["Legs","dsslegs"],["Reg#","dssreg"],["GC#","dssgc"]], extra: ["dsscustom"] },
        { id: "dsdam", sexType: "female", titleChain: ["dsdrabbitry","dsdam"], fields: [["Color","dsdcolor"],["Ear#","dsdear"],["Weight","dsdweight"],["Sex","dsdsex"],["Legs","dsdlegs"],["Reg#","dsdreg"],["GC#","dsdgc"]], extra: ["dsdcustom"] },
        { id: "ddsire", sexType: "male", titleChain: ["ddsrabbitry","ddsire"], fields: [["Color","ddscolor"],["Ear#","ddsear"],["Weight","ddsweight"],["Sex","ddssex"],["Legs","ddslegs"],["Reg#","ddsreg"],["GC#","ddsgc"]], extra: ["ddscustom"] },
        { id: "dddam", sexType: "female", titleChain: ["dddrabbitry","dddam"], fields: [["Color","dddcolor"],["Ear#","dddear"],["Weight","dddweight"],["Sex","dddsex"],["Legs","dddlegs"],["Reg#","dddreg"],["GC#","dddgc"]], extra: ["dddcustom"] }
      ];

      const parentMap = [
        ["main","sire"],["main","dam"],
        ["sire","ssire"],["sire","sdam"],
        ["dam","dsire"],["dam","ddam"],
        ["ssire","sssire"],["ssire","ssdam"],
        ["sdam","sdsire"],["sdam","sddam"],
        ["dsire","dssire"],["dsire","dsdam"],
        ["ddam","ddsire"],["ddam","dddam"]
      ];

      function getParam(name) {
        const raw = params.get(name) || "";
        const urlDecoded = decodeURIComponent(raw.replace(/\+/g, " "));
        const ta = document.createElement("textarea");
        ta.innerHTML = urlDecoded;
        return ta.value;
      }

      function getChain(keys) {
        return keys.map(k => getParam(k)).filter(Boolean).join(" ");
      }

      function setPrintPage() {
        if (layoutOrientation.value === "portrait") {
          printPageStyle.textContent = "@page { size: 8.5in 11in portrait; margin: 0; }";
        } else {
          printPageStyle.textContent = "@page { size: 11in 8.5in landscape; margin: 0; }";
        }
      }

      function clearSvg() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
      }

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([k,v]) => {
          if (k === "href") {
            el.setAttributeNS(xlinkNS, "xlink:href", v);
            el.setAttribute("href", v);
          } else {
            el.setAttribute(k, v);
          }
        });
        return el;
      }

      function addText(group, x, y, text, opts = {}) {
        const t = makeEl("text", {
          x, y,
          "text-anchor": opts.anchor || "start"
        });
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = (opts.size || 14) + "px";
        if (opts.weight) t.style.fontWeight = opts.weight;
        t.textContent = text || "";
        group.appendChild(t);
        return t;
      }

      function addMultiline(group, x, y, lines, opts = {}) {
        const t = makeEl("text", { x, y, "text-anchor": opts.anchor || "start" });
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = (opts.size || 12) + "px";
        if (opts.weight) t.style.fontWeight = opts.weight;
        const lineHeight = opts.lineHeight || 14;
        lines.forEach((line, i) => {
          const ts = makeEl("tspan", {
            x,
            dy: i === 0 ? 0 : lineHeight
          });
          ts.textContent = line;
          t.appendChild(ts);
        });
        group.appendChild(t);
        return t;
      }

      function getCurrentFont() {
        const active = Array.from(fontOptions).find(opt => opt.classList.contains("active"));
        return active ? active.dataset.font : defaults.fontFamily;
      }

      function getFontLabel(fontValue) {
        const option = Array.from(fontOptions).find(opt => opt.dataset.font === fontValue);
        return option ? option.textContent.trim() : "Arial";
      }

      function setActiveFontOption(fontValue) {
        fontOptions.forEach(opt => opt.classList.toggle("active", opt.dataset.font === fontValue));
      }

      function applyFont(fontValue) {
        selectedFontPreview.textContent = getFontLabel(fontValue);
        selectedFontPreview.style.fontFamily = fontValue;
        document.documentElement.style.setProperty("--menu-font", fontValue);
        setActiveFontOption(fontValue);
        render();
      }

      function getMainRabbitSex() {
        const sex = getParam("sex").trim().toLowerCase();
        if (sex.startsWith("m") || sex === "buck") return "male";
        if (sex.startsWith("f") || sex === "doe") return "female";
        return "main";
      }

      function getBoxFill(sexType) {
        if (sexType === "main") {
          if (mainSexColorToggle.checked) {
            const mainSex = getMainRabbitSex();
            if (mainSex === "male") return maleBoxColor.value;
            if (mainSex === "female") return femaleBoxColor.value;
          }
          return mainBoxColor.value;
        }
        return sexType === "male" ? maleBoxColor.value : femaleBoxColor.value;
      }

      function getCanvas() {
        if (layoutOrientation.value === "portrait") {
          return { width: 1100, height: 1600 };
        }
        return { width: 1800, height: 1150 };
      }

      function getLayoutPositions(boxW, boxH, canvas) {
        const layout = layoutOrientation.value;
        const pos = {};

        if (layout === "landscape") {
          const left = 110;
          const right = canvas.width - 110;
          const usableW = right - left - boxW;
          const cols = [
            left,
            left + usableW * (1/3),
            left + usableW * (2/3),
            right - boxW
          ];

          const topTree = 200;
          const bottomTree = canvas.height - 220 - boxH;
          const usableH = bottomTree - topTree;

          function spread(count) {
            if (count === 1) return [topTree + usableH / 2];
            const step = usableH / (count - 1);
            return Array.from({length: count}, (_, i) => topTree + step * i);
          }

          const ys1 = spread(1);
          const ys2 = spread(2);
          const ys4 = spread(4);
          const ys8 = spread(8);

          pos.main   = { x: cols[0], y: ys1[0] };
          pos.sire   = { x: cols[1], y: ys2[0] };
          pos.dam    = { x: cols[1], y: ys2[1] };

          pos.ssire  = { x: cols[2], y: ys4[0] };
          pos.sdam   = { x: cols[2], y: ys4[1] };
          pos.dsire  = { x: cols[2], y: ys4[2] };
          pos.ddam   = { x: cols[2], y: ys4[3] };

          pos.sssire = { x: cols[3], y: ys8[0] };
          pos.ssdam  = { x: cols[3], y: ys8[1] };
          pos.sdsire = { x: cols[3], y: ys8[2] };
          pos.sddam  = { x: cols[3], y: ys8[3] };
          pos.dssire = { x: cols[3], y: ys8[4] };
          pos.dsdam  = { x: cols[3], y: ys8[5] };
          pos.ddsire = { x: cols[3], y: ys8[6] };
          pos.dddam  = { x: cols[3], y: ys8[7] };
        } else {
          const top = 250;
          const bottom = canvas.height - 210;
          const usableH = bottom - top - boxH;
          const rows = [
            top,
            top + usableH * (1/3),
            top + usableH * (2/3),
            bottom - boxH
          ];

          function spreadX(count) {
            const left = 80;
            const right = canvas.width - 80 - boxW;
            if (count === 1) return [left + (right - left)/2];
            const step = (right - left) / (count - 1);
            return Array.from({length: count}, (_, i) => left + step * i);
          }

          const xs1 = spreadX(1);
          const xs2 = spreadX(2);
          const xs4 = spreadX(4);
          const xs8 = spreadX(8);

          pos.main   = { x: xs1[0], y: rows[0] };
          pos.sire   = { x: xs2[0], y: rows[1] };
          pos.dam    = { x: xs2[1], y: rows[1] };

          pos.ssire  = { x: xs4[0], y: rows[2] };
          pos.sdam   = { x: xs4[1], y: rows[2] };
          pos.dsire  = { x: xs4[2], y: rows[2] };
          pos.ddam   = { x: xs4[3], y: rows[2] };

          pos.sssire = { x: xs8[0], y: rows[3] };
          pos.ssdam  = { x: xs8[1], y: rows[3] };
          pos.sdsire = { x: xs8[2], y: rows[3] };
          pos.sddam  = { x: xs8[3], y: rows[3] };
          pos.dssire = { x: xs8[4], y: rows[3] };
          pos.dsdam  = { x: xs8[5], y: rows[3] };
          pos.ddsire = { x: xs8[6], y: rows[3] };
          pos.dddam  = { x: xs8[7], y: rows[3] };
        }

        return pos;
      }

      function drawLine(group, a, b, boxW, boxH) {
        const layout = layoutOrientation.value;
        const lineStyle = lineStyleInput.value;
        const stroke = lineColorInput.value;
        const sw = lineThicknessInput.value;

        let p1, p2, path;

        if (layout === "landscape") {
          p1 = { x: a.x + boxW, y: a.y + boxH / 2 };
          p2 = { x: b.x, y: b.y + boxH / 2 };

          if (lineStyle === "diagonal") {
            group.appendChild(makeEl("line", {
              x1: p1.x, y1: p1.y,
              x2: p2.x, y2: p2.y,
              stroke, "stroke-width": sw
            }));
          } else {
            const midX = (p1.x + p2.x) / 2;
            path = `M ${p1.x} ${p1.y} L ${midX} ${p1.y} L ${midX} ${p2.y} L ${p2.x} ${p2.y}`;
            group.appendChild(makeEl("path", {
              d: path,
              fill: "none",
              stroke,
              "stroke-width": sw
            }));
          }
        } else {
          p1 = { x: a.x + boxW / 2, y: a.y + boxH };
          p2 = { x: b.x + boxW / 2, y: b.y };

          if (lineStyle === "diagonal") {
            group.appendChild(makeEl("line", {
              x1: p1.x, y1: p1.y,
              x2: p2.x, y2: p2.y,
              stroke, "stroke-width": sw
            }));
          } else {
            const midY = (p1.y + p2.y) / 2;
            path = `M ${p1.x} ${p1.y} L ${p1.x} ${midY} L ${p2.x} ${midY} L ${p2.x} ${p2.y}`;
            group.appendChild(makeEl("path", {
              d: path,
              fill: "none",
              stroke,
              "stroke-width": sw
            }));
          }
        }
      }

      function buildBoxText(def) {
        const lines = [];
        const title = getChain(def.titleChain);
        lines.push({ text: title, type: "title" });

        def.fields.forEach(([label, key]) => {
          const value = getParam(key);
          lines.push({ text: `${label}: ${value}`, type: "field" });
        });

        def.extra.forEach(key => {
          const raw = getParam(key);
          if (!raw) return;
          raw.replace(/\\n/g, "\n").split("\n").forEach(line => {
            if (line.trim()) lines.push({ text: line, type: "extra" });
          });
        });

        return lines;
      }

      function drawBox(group, def, x, y, boxW, boxH) {
        const fill = getBoxFill(def.sexType);

        group.appendChild(makeEl("rect", {
          x, y,
          width: boxW,
          height: boxH,
          rx: 10,
          ry: 10,
          fill,
          stroke: "#000000",
          "stroke-width": 1.5
        }));

        const textLines = buildBoxText(def);

        const padX = 10;
        const startY = y + 18;
        const lineHeight = Math.max(12, Math.min(18, boxH / 10));
        const fieldSize = Math.max(10, Math.min(13, boxH / 13));
        const titleSize = Math.max(13, Math.min(16, boxH / 10));
        const maxLines = Math.floor((boxH - 18) / lineHeight);

        const visible = textLines.slice(0, maxLines);

        const t = makeEl("text", { x: x + padX, y: startY });
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;

        visible.forEach((line, i) => {
          const ts = makeEl("tspan", {
            x: x + padX,
            dy: i === 0 ? 0 : lineHeight
          });
          ts.textContent = line.text;
          ts.style.fontSize = (line.type === "title" ? titleSize : fieldSize) + "px";
          if (line.type === "title") ts.style.fontWeight = "700";
          t.appendChild(ts);
        });

        group.appendChild(t);
      }

      function render() {
        clearSvg();

        const canvas = getCanvas();
        const boxW = Number(boxWidthInput.value);
        const boxH = Number(boxHeightInput.value);
        const positions = getLayoutPositions(boxW, boxH, canvas);

        svg.setAttribute("viewBox", `0 0 ${canvas.width} ${canvas.height}`);
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        boxWidthValue.textContent = boxW;
        boxHeightValue.textContent = boxH;
        lineThicknessValue.textContent = lineThicknessInput.value;
        watermarkOpacityValue.textContent = Number(watermarkOpacity.value).toFixed(2);
        watermarkSizeValue.textContent = watermarkSize.value;

        setPrintPage();

        const bgLayer = makeEl("g");
        const watermarkLayer = makeEl("g");
        const headerLayer = makeEl("g");
        const lineLayer = makeEl("g");
        const photoLayer = makeEl("g");
        const boxLayer = makeEl("g");
        const footerLayer = makeEl("g");

        svg.append(bgLayer, watermarkLayer, headerLayer, lineLayer, photoLayer, boxLayer, footerLayer);

        const bgUrl = getParam("background-image");
        if (bgUrl) {
          const bg = makeEl("image", {
            href: bgUrl,
            preserveAspectRatio: "xMidYMid meet"
          });

          if (layoutOrientation.value === "portrait") {
            bg.setAttribute("x", 0);
            bg.setAttribute("y", 0);
            bg.setAttribute("width", canvas.height);
            bg.setAttribute("height", canvas.width);
            bg.setAttribute("transform", `translate(${canvas.width},0) rotate(90)`);
          } else {
            bg.setAttribute("x", 0);
            bg.setAttribute("y", 0);
            bg.setAttribute("width", canvas.width);
            bg.setAttribute("height", canvas.height);
          }

          bg.style.pointerEvents = "none";
          bgLayer.appendChild(bg);
        }

        const logoUrl = getParam("logo");
        if (logoUrl && toggleWatermark.checked) {
          const pct = Number(watermarkSize.value) / 100;
          const wmBase = Math.min(canvas.width, canvas.height) * pct;
          const wmX = (canvas.width - wmBase) / 2;
          const wmY = (canvas.height - wmBase) / 2 + 40;

          const wm = makeEl("image", {
            href: logoUrl,
            x: wmX,
            y: wmY,
            width: wmBase,
            height: wmBase,
            preserveAspectRatio: "xMidYMid meet",
            opacity: watermarkOpacity.value
          });

          wm.style.pointerEvents = "none";
          watermarkLayer.appendChild(wm);
        }

        const logoSize = layoutOrientation.value === "portrait" ? 120 : 140;
        const logoX = 40;
        const logoY = 25;

        if (logoUrl) {
          headerLayer.appendChild(makeEl("image", {
            href: logoUrl,
            x: logoX,
            y: logoY,
            width: logoSize,
            height: logoSize,
            preserveAspectRatio: "xMidYMid meet"
          }));
        }

        const headerTextX = logoX + logoSize + 22;
        const headerTop = 55;
        addText(headerLayer, headerTextX, headerTop, getParam("rabbitry"), { size: 24, weight: 700 });
        addText(headerLayer, headerTextX, headerTop + 26, getParam("street"), { size: 16, weight: 600 });
        addText(headerLayer, headerTextX, headerTop + 50, [getParam("city"), getParam("state"), getParam("zip")].filter(Boolean).join(" "), { size: 16, weight: 600 });
        addText(headerLayer, headerTextX, headerTop + 74, getParam("phone"), { size: 16, weight: 600 });
        addText(headerLayer, headerTextX, headerTop + 98, getParam("email"), { size: 16, weight: 600 });
        addText(headerLayer, headerTextX, headerTop + 126, `Breed: ${getParam("breed")}`, { size: 16, weight: 700 });
        addText(headerLayer, headerTextX, headerTop + 150, `DOB: ${getParam("dob")}`, { size: 16, weight: 700 });

        if (toggleRabbitPhoto.checked && getParam("rabbitphoto")) {
          const photoW = layoutOrientation.value === "portrait" ? 210 : 230;
          const photoH = layoutOrientation.value === "portrait" ? 170 : 180;
          const photoX = canvas.width - photoW - 40;
          const photoY = 40;

          photoLayer.appendChild(makeEl("rect", {
            x: photoX,
            y: photoY,
            width: photoW,
            height: photoH,
            rx: 10,
            ry: 10,
            fill: "#ffffff",
            stroke: "#000000",
            "stroke-width": 1.5
          }));

          photoLayer.appendChild(makeEl("image", {
            href: getParam("rabbitphoto"),
            x: photoX + 6,
            y: photoY + 6,
            width: photoW - 12,
            height: photoH - 12,
            preserveAspectRatio: "xMidYMid meet"
          }));
        }

        parentMap.forEach(([childId, parentId]) => {
          drawLine(lineLayer, positions[childId], positions[parentId], boxW, boxH);
        });

        boxDefs.forEach(def => {
          const p = positions[def.id];
          drawBox(boxLayer, def, p.x, p.y, boxW, boxH);
        });

        const sigUrl = getParam("signature");
        const footerY = canvas.height - 90;
        addText(footerLayer, 40, footerY - 40, "I hereby certify that this pedigree is correct to the best of my knowledge.", { size: 16, weight: 600 });

        footerLayer.appendChild(makeEl("line", {
          x1: 40, y1: footerY + 10,
          x2: 350, y2: footerY + 10,
          stroke: "#000000",
          "stroke-width": 1
        }));

        if (sigUrl) {
          footerLayer.appendChild(makeEl("image", {
            href: sigUrl,
            x: 40,
            y: footerY - 55,
            width: 220,
            height: 70,
            preserveAspectRatio: "xMidYMid meet"
          }));
        }

        addText(footerLayer, 40, footerY + 34, getParam("owner"), { size: 16, weight: 700 });

        addText(
          footerLayer,
          canvas.width - 40,
          canvas.height - 28,
          "Pedigree built on the ShowTails LLC platform - www.showtails.com",
          { size: 12, anchor: "end" }
        );
      }

      function applyPresetIfNeeded() {
        const selected = colorPreset.value;
        if (selected === "custom") return;
        const preset = presets[selected];
        if (!preset) return;
        maleBoxColor.value = preset.male;
        femaleBoxColor.value = preset.female;
        mainBoxColor.value = preset.main;
      }

      function resetDefaults() {
        colorPreset.value = defaults.preset;
        mainSexColorToggle.checked = defaults.mainSexColor;
        mainBoxColor.value = defaults.main;
        maleBoxColor.value = defaults.male;
        femaleBoxColor.value = defaults.female;
        fontColor.value = defaults.fontColor;
        layoutOrientation.value = defaults.layout;
        boxWidthInput.value = defaults.boxWidth;
        boxHeightInput.value = defaults.boxHeight;
        lineStyleInput.value = defaults.lineStyle;
        lineColorInput.value = defaults.lineColor;
        lineThicknessInput.value = defaults.lineThickness;
        toggleWatermark.checked = defaults.watermarkEnabled;
        watermarkOpacity.value = defaults.watermarkOpacity;
        watermarkSize.value = defaults.watermarkSize;
        toggleRabbitPhoto.checked = defaults.rabbitPhotoEnabled;
        applyFont(defaults.fontFamily);
        render();
      }

      menuToggle.addEventListener("click", () => {
        pedigreeMenu.classList.toggle("open");
      });

      document.addEventListener("click", (event) => {
        if (!pedigreeMenu.contains(event.target) && event.target !== menuToggle) {
          pedigreeMenu.classList.remove("open");
        }
      });

      fontPickerButton.addEventListener("click", (e) => {
        e.stopPropagation();
        fontPicker.classList.toggle("open");
      });

      fontOptions.forEach(option => {
        option.addEventListener("click", () => {
          applyFont(option.dataset.font);
          fontPicker.classList.remove("open");
        });
      });

      document.addEventListener("click", (event) => {
        if (!fontPicker.contains(event.target)) {
          fontPicker.classList.remove("open");
        }
      });

      colorPreset.addEventListener("change", () => {
        applyPresetIfNeeded();
        render();
      });

      [
        mainSexColorToggle,
        mainBoxColor,
        maleBoxColor,
        femaleBoxColor,
        fontColor,
        layoutOrientation,
        boxWidthInput,
        boxHeightInput,
        lineStyleInput,
        lineColorInput,
        lineThicknessInput,
        toggleWatermark,
        watermarkOpacity,
        watermarkSize,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("input", render));

      [
        mainSexColorToggle,
        layoutOrientation,
        toggleWatermark,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("change", render));

      resetStylesBtn.addEventListener("click", resetDefaults);

      printBtn.addEventListener("click", () => {
        window.print();
      });

      window.addEventListener("resize", render);

      applyFont(defaults.fontFamily);
      resetDefaults();
    })();
  </script>
</body>
</html>
