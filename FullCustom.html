<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: white;
    }

    #pedigree-svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      margin: 0 auto !important;
      background: white !important;
      page-break-inside: avoid !important;
      touch-action: none !important;
      -ms-touch-action: none !important;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 325px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-actions button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #menu-save-btn {
      background: #2f6f86;
      color: #fff;
    }

    #menu-print-btn {
      background: #234a57;
      color: #fff;
    }

    #reset-styles-btn {
      background: #eaf2f6;
      color: #234a57;
    }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @page {
      size: 11in 8.5in landscape;
      margin: 0;
    }

    @media print {
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background: white;
      }

      #pedigree-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        background: white;
        overflow: hidden;
      }

      #pedigree-svg {
        width: 100% !important;
        height: 100% !important;
        transform: none !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
      }

      #pedigree-container svg {
        transform: scale(1) translate(0, 0) !important;
        position: absolute !important;
        top: 0;
        left: 0;
      }

      #pedigree-container > * {
        transform: none !important;
      }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
        visibility: hidden !important;
      }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-note">Choose a preset or fine-tune colors below.</div>

    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-save-btn" type="button">Save Settings</button>
        <button id="menu-print-btn" type="button">Print / Save PDF</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div class="menu-note" id="save-status" style="margin-top:8px; margin-bottom:0;"></div>
    </div>

    <div class="menu-section">
      <label for="color-preset">Preset Male / Female Pairings</label>
      <select id="color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
      </select>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Main Rabbit Uses Sex Color</span>
        <input type="checkbox" id="main-sex-color-toggle">
      </div>

      <label for="main-box-color">Main Rabbit Box Color</label>
      <input type="color" id="main-box-color" value="#ffffff">

      <label for="male-box-color">Male Box Color</label>
      <input type="color" id="male-box-color" value="#cce5ff">

      <label for="female-box-color">Female Box Color</label>
      <input type="color" id="female-box-color" value="#f8d7da">
    </div>

    <div class="menu-section">
      <label>Font Style</label>
      <div class="font-picker" id="fontPicker">
        <button type="button" class="font-picker-button" id="fontPickerButton">
          <span id="selectedFontPreview" style="font-family: Arial, sans-serif;">Arial</span>
          <span class="font-picker-arrow">▾</span>
        </button>
        <div class="font-picker-dropdown" id="fontPickerDropdown">
          <div class="font-option active" data-font="Arial, sans-serif" style="font-family: Arial, sans-serif;">Arial</div>
          <div class="font-option" data-font="'Poppins', sans-serif" style="font-family: 'Poppins', sans-serif;">Poppins</div>
          <div class="font-option" data-font="'Inter', sans-serif" style="font-family: 'Inter', sans-serif;">Inter</div>
          <div class="font-option" data-font="'Georgia', serif" style="font-family: 'Georgia', serif;">Georgia</div>
          <div class="font-option" data-font="'Times New Roman', serif" style="font-family: 'Times New Roman', serif;">Times New Roman</div>
          <div class="font-option" data-font="'Verdana', sans-serif" style="font-family: 'Verdana', sans-serif;">Verdana</div>
          <div class="font-option" data-font="'Courier New', monospace" style="font-family: 'Courier New', monospace;">Courier New</div>
        </div>
      </div>

      <label for="font-color" style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">

      <label for="box-name-font-size" style="margin-top:10px;">Rabbit Name Font Size</label>
      <input type="range" id="box-name-font-size" min="12" max="22" step="1" value="15">
      <div class="range-readout"><span id="box-name-font-size-value">15</span> px</div>

      <label for="box-body-font-size">Box Body Font Size</label>
      <input type="range" id="box-body-font-size" min="9" max="16" step="1" value="11">
      <div class="range-readout"><span id="box-body-font-size-value">11</span> px</div>
    </div>

    <div class="menu-section">
      <label for="layout-orientation">Pedigree Layout</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>

      <label for="box-width">Box Width</label>
      <input type="range" id="box-width" min="180" max="320" step="5" value="220">
      <div class="range-readout"><span id="box-width-value">220</span> px</div>

      <label for="box-height">Box Height</label>
      <input type="range" id="box-height" min="110" max="180" step="5" value="125">
      <div class="range-readout"><span id="box-height-value">125</span> px</div>
    </div>

    <div class="menu-section">
      <label for="line-style">Pedigree Line Style</label>
      <select id="line-style">
        <option value="diagonal">Diagonal</option>
        <option value="tree">Standard Tree</option>
      </select>

      <label for="line-color">Line Color</label>
      <input type="color" id="line-color" value="#000000">

      <label for="line-thickness">Line Thickness</label>
      <input type="range" id="line-thickness" min="1" max="6" step="0.5" value="1.5">
      <div class="range-readout"><span id="line-thickness-value">1.5</span> px</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Watermark</span>
        <input type="checkbox" id="toggle-watermark">
      </div>

      <label for="watermark-opacity">Watermark Opacity</label>
      <input type="range" id="watermark-opacity" min="0.03" max="0.30" step="0.01" value="0.10">
      <div class="range-readout"><span id="watermark-opacity-value">0.10</span></div>

      <label for="watermark-size">Watermark Size</label>
      <input type="range" id="watermark-size" min="25" max="95" step="1" value="55">
      <div class="range-readout"><span id="watermark-size-value">55</span>%</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Rabbit Photo</span>
        <input type="checkbox" id="toggle-rabbit-photo">
      </div>
      <div class="menu-note" style="margin-bottom:0;">Image query parameter: <strong>rabbitphoto</strong></div>
    </div>
  </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" viewBox="-80 -170 1750 1400" preserveAspectRatio="none"></svg>
  </div>

            sssire: { x: 950, y: 60 },
            ssdam:  { x: 950, y: 195 },
            sdsire: { x: 950, y: 330 },

      function getLayoutBase() {
        return layoutOrientation.value === "portrait" ? portraitBase : landscapeBase;
      }

      function getBoxPosition(id) {
        return getLayoutBase().tree.boxes[id];
      }

      function getActiveBoxWidth() {
        return Number(boxWidthInput.value);
      }

      function getActiveBoxHeight() {
        return Number(boxHeightInput.value);
      }

      function decodeLineBreaks(text) {
        return String(text || "").replace(/\\n/g, "\n");
      }

      function applyPresetIfNeeded() {
        const selected = colorPreset.value;
        if (selected === "custom") return;
        const preset = presets[selected];
        if (!preset) return;
        maleBoxColor.value = preset.male;
        femaleBoxColor.value = preset.female;
        mainBoxColor.value = preset.main;
      }

      function getCurrentFont() {
        const active = Array.from(fontOptions).find(opt => opt.classList.contains("active"));
        return active ? active.dataset.font : defaults.fontFamily;
      }

      function getFontLabel(fontValue) {
        const option = Array.from(fontOptions).find(opt => opt.dataset.font === fontValue);
        return option ? option.textContent.trim() : "Arial";
      }

      function setActiveFontOption(fontValue) {
        fontOptions.forEach(opt => opt.classList.toggle("active", opt.dataset.font === fontValue));
      }

      function applyFont(fontValue, shouldRender = true) {
        selectedFontPreview.textContent = getFontLabel(fontValue);
        selectedFontPreview.style.fontFamily = fontValue;
        document.documentElement.style.setProperty("--menu-font", fontValue);
        setActiveFontOption(fontValue);
        if (shouldRender) render();
      }

      function getCurrentSettings() {
        return {
          preset: colorPreset.value,
          mainSexColor: mainSexColorToggle.checked,
          main: mainBoxColor.value,
          male: maleBoxColor.value,
          female: femaleBoxColor.value,
          fontColor: fontColor.value,
          fontFamily: getCurrentFont(),
          layout: layoutOrientation.value,
          boxWidth: Number(boxWidthInput.value),
          boxHeight: Number(boxHeightInput.value),
          nameFont: Number(boxNameFontSizeInput.value),
          bodyFont: Number(boxBodyFontSizeInput.value),
          lineStyle: lineStyleInput.value,
          lineColor: lineColorInput.value,
          lineThickness: Number(lineThicknessInput.value),
          watermarkEnabled: toggleWatermark.checked,
          watermarkOpacity: Number(watermarkOpacity.value),
          watermarkSize: Number(watermarkSize.value),
          rabbitPhotoEnabled: toggleRabbitPhoto.checked
        };
      }

      function applySettings(settings, shouldRender = true) {
        if (!settings || typeof settings !== "object") return;

        if (settings.preset != null) colorPreset.value = settings.preset;
        if (settings.mainSexColor != null) mainSexColorToggle.checked = !!settings.mainSexColor;
        if (settings.main) mainBoxColor.value = settings.main;
        if (settings.male) maleBoxColor.value = settings.male;
        if (settings.female) femaleBoxColor.value = settings.female;
        if (settings.fontColor) fontColor.value = settings.fontColor;
        if (settings.layout) layoutOrientation.value = settings.layout;
        if (settings.boxWidth != null) boxWidthInput.value = settings.boxWidth;
        if (settings.boxHeight != null) boxHeightInput.value = settings.boxHeight;
        if (settings.nameFont != null) boxNameFontSizeInput.value = settings.nameFont;
        if (settings.bodyFont != null) boxBodyFontSizeInput.value = settings.bodyFont;
        if (settings.lineStyle) lineStyleInput.value = settings.lineStyle;
        if (settings.lineColor) lineColorInput.value = settings.lineColor;
        if (settings.lineThickness != null) lineThicknessInput.value = settings.lineThickness;
        if (settings.watermarkEnabled != null) toggleWatermark.checked = !!settings.watermarkEnabled;
        if (settings.watermarkOpacity != null) watermarkOpacity.value = settings.watermarkOpacity;
        if (settings.watermarkSize != null) watermarkSize.value = settings.watermarkSize;
        if (settings.rabbitPhotoEnabled != null) toggleRabbitPhoto.checked = !!settings.rabbitPhotoEnabled;
        if (settings.fontFamily) applyFont(settings.fontFamily, false);

        if (shouldRender) render();
      }

      function getSavedSettingsFromUrl() {
        const raw = getRawParam("saved");
        if (!raw) return null;
        try {
          return JSON.parse(decodeURIComponent(raw));
        } catch (err) {
          try {
            return JSON.parse(raw);
          } catch (e) {
            return null;
          }
        }
      }

      async function saveSettingsToShowTails() {
        const settings = getCurrentSettings();
        const email = getParam("email").trim();

        if (!email) {
          saveStatus.textContent = "Unable to save: missing email address.";
          return;
        }

        saveStatus.textContent = "Saving settings...";
        saveBtn.disabled = true;

        try {
          const response = await fetch(SAVE_SETTINGS_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email,
              savedPedigreeSettings: JSON.stringify(settings)
            })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          saveStatus.textContent = "Settings saved.";
          try {
            const url = new URL(window.location.href);
            url.searchParams.set("saved", JSON.stringify(settings));
            window.history.replaceState({}, "", url.toString());
          } catch (err) {}
        } catch (error) {
          console.error(error);
          saveStatus.textContent = "Could not save settings.";
        } finally {
          saveBtn.disabled = false;
        }
      }

      function getMainRabbitSex() {
        const sex = getParam("sex").trim().toLowerCase();
        if (sex.startsWith("m") || sex === "buck") return "male";
        if (sex.startsWith("f") || sex === "doe") return "female";
        return "main";
      }

      function getBoxFill(sexType) {
        if (sexType === "main") {
          if (mainSexColorToggle.checked) {
            const mainSex = getMainRabbitSex();
            if (mainSex === "male") return maleBoxColor.value;
            if (mainSex === "female") return femaleBoxColor.value;
          }
          return mainBoxColor.value;
        }
        return sexType === "male" ? maleBoxColor.value : femaleBoxColor.value;
      }

      function clearSvg() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
      }

      function addSimpleText(group, x, y, text, size, weight, anchor = "start") {
        const t = makeEl("text", { x, y, "text-anchor": anchor });
        t.textContent = text || "";
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = size + "px";
        if (weight) t.style.fontWeight = weight;
        group.appendChild(t);
        return t;
      }

      function addTspanText(textEl, x, dy, text, size, weight) {
        const ts = makeEl("tspan", { x, dy });
        ts.textContent = text || "";
        ts.style.fontSize = size + "px";
        if (weight) ts.style.fontWeight = weight;
        textEl.appendChild(ts);
      }

      function buildBoxLines(def) {
        const lines = [];
        lines.push({ text: [getParam(def.titleChain[0]), getParam(def.titleChain[1])].filter(Boolean).join(" "), type: "title" });

        const data = [
          `Color: ${getParam(def.fields[0][1])}`,
          `Ear#: ${getParam(def.fields[1][1])}     Weight: ${getParam(def.fields[2][1])}`,
          `Sex: ${getParam(def.fields[3][1])}     Legs: ${getParam(def.fields[4][1])}`,
          `Reg#: ${getParam(def.fields[5][1])}     GC#: ${getParam(def.fields[6][1])}`
        ];
        data.forEach(line => lines.push({ text: line, type: "body" }));

        def.extra.forEach(key => {
          const extra = decodeLineBreaks(getParam(key));
          if (!extra) return;
          extra.split("\n").forEach(row => {
            if (row.trim()) lines.push({ text: row.trim(), type: "body" });
          });
        });

        return lines;
      }

      function drawBox(def) {
        const pos = getBoxPosition(def.id);
        const boxW = getActiveBoxWidth();
        const boxH = getActiveBoxHeight();
        const fill = getBoxFill(def.sexType);

        const rect = makeEl("rect", {
          x: pos.x,
          y: pos.y,
          width: boxW,
          height: boxH,
          rx: 10,
          ry: 10,
          fill,
          stroke: "#000000",
          "stroke-width": 1.5
        });
        svg.appendChild(rect);

        const lines = buildBoxLines(def);
        const textEl = makeEl("text", {
          x: pos.x + 10,
          y: pos.y + 20,
          "text-anchor": "start"
        });
        textEl.style.fontFamily = getCurrentFont();
        textEl.style.fill = fontColor.value;
        svg.appendChild(textEl);

        const titleSize = Number(boxNameFontSizeInput.value);
        const bodySize = Number(boxBodyFontSizeInput.value);
        const bodyStep = Math.max(18, bodySize + 6);

        let currentDy = 0;
        lines.forEach((line, index) => {
          if (line.type === "title") {
            addTspanText(textEl, pos.x + 10, index === 0 ? 0 : bodyStep, line.text, titleSize, "700");
            currentDy = titleSize + 4;
          } else {
            addTspanText(textEl, pos.x + 10, bodyStep, line.text, bodySize, "400");
            currentDy += bodyStep;
          }
        });

        if (def.gen < 4 && def.wins) {
          const wins = decodeLineBreaks(getParam(def.wins)).split("\n").filter(Boolean);
          if (wins.length) {
            const winText = makeEl("text", {
              x: pos.x + 10,
              y: pos.y + boxH + 30,
              "text-anchor": "start"
            });
            winText.style.fontFamily = getCurrentFont();
            winText.style.fill = fontColor.value;
            winText.style.fontSize = Math.max(10, bodySize) + "px";

            wins.slice(0, 3).forEach((line, idx) => {
              const ts = makeEl("tspan", { x: pos.x + 10, dy: idx === 0 ? 0 : bodySize + 4 });
              ts.textContent = line;
              winText.appendChild(ts);
            });

            svg.appendChild(winText);
          }
        }
      }

      function drawConnection(childId, parentId) {
        const child = getBoxPosition(childId);
        const parent = getBoxPosition(parentId);
        const boxW = getActiveBoxWidth();
        const boxH = getActiveBoxHeight();

        const x1 = child.x + boxW;
        const y1 = child.y + boxH / 2;
        const x2 = parent.x;
        const y2 = parent.y + boxH / 2;

        if (lineStyleInput.value === "tree") {
          const midX = (x1 + x2) / 2;
          const path = makeEl("path", {
            d: `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`,
            fill: "none",
            stroke: lineColorInput.value,
            "stroke-width": lineThicknessInput.value
          });
          svg.appendChild(path);
        } else {
          const line = makeEl("line", {
            x1, y1, x2, y2,
            stroke: lineColorInput.value,
            "stroke-width": lineThicknessInput.value
          });
          svg.appendChild(line);
        }
      }

        const bg = makeEl("image", {

        addSimpleText(g2, 0, 60, getParam("phone"), 16, "700");
        addSimpleText(g2, 0, 80, getParam("email"), 16, "700");
        addSimpleText(g2, 0, 110, "Breed:", 16, "700");
        addSimpleText(g2, 60, 110, getParam("breed"), 16, "700");

      function buildFooter() {

      function buildRabbitPhoto() {

      function render() {
        if (isBuilding) return;
        isBuilding = true;

        clearSvg();

        const base = getLayoutBase();
        svg.setAttribute("viewBox", base.viewBox);
        svg.setAttribute("preserveAspectRatio", "none");

        boxWidthValue.textContent = boxWidthInput.value;
        boxHeightValue.textContent = boxHeightInput.value;
        boxNameFontSizeValue.textContent = boxNameFontSizeInput.value;
        boxBodyFontSizeValue.textContent = boxBodyFontSizeInput.value;
        lineThicknessValue.textContent = lineThicknessInput.value;
        watermarkOpacityValue.textContent = Number(watermarkOpacity.value).toFixed(2);
        watermarkSizeValue.textContent = watermarkSize.value;

        buildHeader();
        buildRabbitPhoto();

        [
          ["main","sire"],["main","dam"],
          ["sire","ssire"],["sire","sdam"],
          ["dam","dsire"],["dam","ddam"],
          ["ssire","sssire"],["ssire","ssdam"],
          ["sdam","sdsire"],["sdam","sddam"],
          ["dsire","dssire"],["dsire","dsdam"],
          ["ddam","ddsire"],["ddam","dddam"]
        ].forEach(([child, parent]) => drawConnection(child, parent));

        boxDefs.forEach(drawBox);
        buildFooter();

        if (panZoom) {
          try { panZoom.destroy(); } catch (err) {}
          panZoom = null;
          initialized = false;
        }

        requestAnimationFrame(() => {
          tryInit();
          isBuilding = false;
        });
      }

      function validBox(vb) {
        return vb && isFinite(vb.width) && vb.width > 0 && isFinite(vb.height) && vb.height > 0;
      }

      function computeFit() {
        const vb = svg.viewBox.baseVal;
        if (!validBox(vb)) return null;

        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!cw || !ch) return null;

        const scale = Math.min(cw / vb.width, ch / vb.height);
        if (!isFinite(scale) || scale <= 0) return null;

        return {
          scale,
          pan: {
            x: (cw - vb.width * scale) / 2,
            y: (ch - vb.height * scale) / 2
          }
        };
      }

      function fitToContainer() {
        if (!panZoom) return;
        const fit = computeFit();
        if (!fit) return;
        panZoom.zoom(fit.scale);
        panZoom.pan(fit.pan);
      }

      window.computeFit = computeFit;

      function tryInit() {
        if (initialized) return;
        if (typeof window.svgPanZoom !== "function") {
          console.error("svg-pan-zoom not loaded.");
          return;
        }

        const vb = svg.viewBox.baseVal;
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!validBox(vb) || !cw || !ch) return;

        panZoom = svgPanZoom(svg, {
          panEnabled: true,
          zoomEnabled: true,
          mouseWheelZoomEnabled: true,
          controlIconsEnabled: false,
          fit: false,
          center: true,
          minZoom: 0.25,
          maxZoom: 10,
          dblClickZoomEnabled: true,
          onUpdatedCTM: function () {}
        });

        window.panZoomInstance = panZoom;
        fitToContainer();
        enablePointerPan();
        enablePinchZoom();
        wireWheelZoom();
        initialized = true;
      }

      function wireWheelZoom() {
        if (container.dataset.wheelWired === "1") return;
        container.addEventListener("wheel", (e) => {
          if (!panZoom) return;
          const rect = svg.getBoundingClientRect();
          const point = { x: e.clientX - rect.left, y: e.clientY - rect.top };
          const delta = e.deltaY;
          const factor = delta > 0 ? 0.9 : 1.1;
          e.preventDefault();
          if (isFinite(point.x) && isFinite(point.y)) {
            panZoom.zoomAtPoint(factor, point);
          }
        }, { passive: false });
        container.dataset.wheelWired = "1";
      }

      function enablePointerPan() {
        if (svg.dataset.pointerWired === "1") return;
        let isPanning = false;
        let start = { x: 0, y: 0 };

        svg.addEventListener("pointerdown", (e) => {
          isPanning = true;
          start = { x: e.clientX, y: e.clientY };
          try { svg.setPointerCapture(e.pointerId); } catch (err) {}
        });

        svg.addEventListener("pointermove", (e) => {
          if (!isPanning || !panZoom) return;
          const dx = e.clientX - start.x;
          const dy = e.clientY - start.y;
          panZoom.panBy({ x: dx, y: dy });
          start = { x: e.clientX, y: e.clientY };
        });

        svg.addEventListener("pointerup", () => { isPanning = false; });
        svg.addEventListener("pointercancel", () => { isPanning = false; });
        svg.dataset.pointerWired = "1";
      }

      function enablePinchZoom() {
        if (svg.dataset.pinchWired === "1") return;
        let pinchStart = null;
        let startZoom = 1;

        svg.addEventListener("touchstart", (e) => {
          if (e.touches.length === 2 && window.panZoomInstance) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStart = Math.hypot(dx, dy);
            startZoom = window.panZoomInstance.getZoom();
          }
        }, { passive: false });

        svg.addEventListener("touchmove", (e) => {
          if (e.touches.length === 2 && window.panZoomInstance && pinchStart) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const pinchNow = Math.hypot(dx, dy);
            const zoomRatio = pinchNow / pinchStart;

            const rect = svg.getBoundingClientRect();
            const mid = {
              x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
              y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
            };

            window.panZoomInstance.zoomAtPoint(startZoom * zoomRatio, mid);
          }
        }, { passive: false });

        svg.addEventListener("touchend", () => {
          pinchStart = null;
        });

        svg.dataset.pinchWired = "1";
      }

      function resetDefaults() {
        colorPreset.value = defaults.preset;
        mainSexColorToggle.checked = defaults.mainSexColor;
        mainBoxColor.value = defaults.main;
        maleBoxColor.value = defaults.male;
        femaleBoxColor.value = defaults.female;
        fontColor.value = defaults.fontColor;
        layoutOrientation.value = defaults.layout;
        boxWidthInput.value = defaults.boxWidth;
        boxHeightInput.value = defaults.boxHeight;
        boxNameFontSizeInput.value = defaults.nameFont;
        boxBodyFontSizeInput.value = defaults.bodyFont;
        lineStyleInput.value = defaults.lineStyle;
        lineColorInput.value = defaults.lineColor;
        lineThicknessInput.value = defaults.lineThickness;
        toggleWatermark.checked = defaults.watermarkEnabled;
        watermarkOpacity.value = defaults.watermarkOpacity;
        watermarkSize.value = defaults.watermarkSize;
        toggleRabbitPhoto.checked = defaults.rabbitPhotoEnabled;
        saveStatus.textContent = "";
        applyFont(defaults.fontFamily, false);
        render();
      }

      function resetForPrint() {
        const inst = window.panZoomInstance;
        if (!inst) return;

        window._savedState = { pan: inst.getPan(), zoom: inst.getZoom() };

        inst.resetZoom();
        inst.center();

        const printProfile = getLayoutBase().print;
        inst.zoom(printProfile.zoom);
        inst.pan(printProfile.pan);
      }

      function restoreAfterPrint() {
        const inst = window.panZoomInstance;
        const s = window._savedState;
        if (inst && s) {
          inst.zoom(s.zoom);
          inst.pan(s.pan);
        }
      }

      menuToggle.addEventListener("click", () => {
        pedigreeMenu.classList.toggle("open");
      });

      document.addEventListener("click", (event) => {
        if (!pedigreeMenu.contains(event.target) && event.target !== menuToggle) {
          pedigreeMenu.classList.remove("open");
        }
      });

      fontPickerButton.addEventListener("click", (e) => {
        e.stopPropagation();
        fontPicker.classList.toggle("open");
      });

      fontOptions.forEach(option => {
        option.addEventListener("click", () => {
          applyFont(option.dataset.font);
          fontPicker.classList.remove("open");
        });
      });

      document.addEventListener("click", (event) => {
        if (!fontPicker.contains(event.target)) {
          fontPicker.classList.remove("open");
        }
      });

      colorPreset.addEventListener("change", () => {
        applyPresetIfNeeded();
        render();
      });

      [
        mainSexColorToggle,
        mainBoxColor,
        maleBoxColor,
        femaleBoxColor,
        fontColor,
        layoutOrientation,
        boxWidthInput,
        boxHeightInput,
        boxNameFontSizeInput,
        boxBodyFontSizeInput,
        lineStyleInput,
        lineColorInput,
        lineThicknessInput,
        toggleWatermark,
        watermarkOpacity,
        watermarkSize,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("input", render));

      [
        mainSexColorToggle,
        layoutOrientation,
        toggleWatermark,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("change", render));

      saveBtn.addEventListener("click", saveSettingsToShowTails);
      resetStylesBtn.addEventListener("click", resetDefaults);

      window.addEventListener("beforeprint", resetForPrint);
      window.addEventListener("afterprint", restoreAfterPrint);

      printBtn.addEventListener("click", () => {
        resetForPrint();
        requestAnimationFrame(() => {
          setTimeout(() => {
            window.print();
            setTimeout(restoreAfterPrint, 800);
          }, 200);
        });
      });

      const ro = new ResizeObserver(() => {
        if (!initialized) tryInit();
        else fitToContainer();
      });
      ro.observe(container);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (!initialized) tryInit();
          else fitToContainer();
        }
      });

      window.addEventListener("load", () => {
        params = getSearchParams();
        applyFont(defaults.fontFamily, false);
        resetDefaults();

        const savedSettings = getSavedSettingsFromUrl();
        if (savedSettings) {
          applySettings(savedSettings);
        }

        tryInit();
      });
    })();
  </script>
</body>
</html>
