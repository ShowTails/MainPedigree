<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>ShowTails Pedigree Explorer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:white;
font-family:Arial;
}

#pedigree-container{
width:100vw;
height:100vh;
overflow:hidden;
position:relative;
}

#pedigree-svg{
width:100%;
height:100%;
touch-action:none;
}

#menu-toggle{
position:absolute;
top:12px;
right:12px;
z-index:100;
background:#234a57;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

#pedigree-menu{
position:absolute;
top:60px;
right:12px;
width:300px;
background:white;
border-radius:12px;
border:1px solid #d6e2e8;
padding:14px;
display:none;
z-index:100;
}

#pedigree-menu.open{
display:block;
}

.menu-title{
font-weight:700;
margin-bottom:8px;
}

.menu-section{
margin-top:12px;
border-top:1px solid #eee;
padding-top:10px;
}

.toggle-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

</style>
</head>


<body>

<button id="menu-toggle">Customize</button>

<div id="pedigree-menu">

<div class="menu-title">Pedigree Options</div>

<div class="menu-section">

<div class="toggle-row">
<span>Show Watermark</span>
<input type="checkbox" id="toggle-watermark">
</div>

<div class="toggle-row">
<span>Show Rabbit Photo</span>
<input type="checkbox" id="toggle-rabbit-photo">
</div>

</div>

</div>


<div id="pedigree-container">

<svg id="pedigree-svg">

<g id="viewport">

<!-- STATIC TREE -->
<g id="tree-root">

<g id="tree-lines"></g>
<g id="tree-boxes"></g>
<g id="tree-wins"></g>
<g id="tree-photos"></g>

</g>


<!-- STYLE LAYERS -->
<g id="style-root">

<g id="border-layer"></g>
<g id="watermark-layer"></g>
<g id="header-layer"></g>
<g id="footer-layer"></g>

</g>

</g>

</svg>

</div>



<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

<script>


const svg = document.getElementById("pedigree-svg")
const viewport = document.getElementById("viewport")

const treeRoot = document.getElementById("tree-root")
const treeLines = document.getElementById("tree-lines")
const treeBoxes = document.getElementById("tree-boxes")
const treeWins = document.getElementById("tree-wins")
const treePhotos = document.getElementById("tree-photos")

const borderLayer = document.getElementById("border-layer")
const watermarkLayer = document.getElementById("watermark-layer")
const headerLayer = document.getElementById("header-layer")
const footerLayer = document.getElementById("footer-layer")


let panZoom
let treeBuilt=false


const boxW=220
const boxH=125


const positions={

main:{x:80,y:350},

sire:{x:360,y:220},
dam:{x:360,y:480},

ssire:{x:640,y:120},
sdam:{x:640,y:320},
dsire:{x:640,y:420},
ddam:{x:640,y:620},

sssire:{x:920,y:60},
ssdam:{x:920,y:160},
sdsire:{x:920,y:260},
sddam:{x:920,y:360},
dssire:{x:920,y:460},
dsdam:{x:920,y:560},
ddsire:{x:920,y:660},
dddam:{x:920,y:760}

}


const parentMap=[
["main","sire"],
["main","dam"],

["sire","ssire"],
["sire","sdam"],

["dam","dsire"],
["dam","ddam"],

["ssire","sssire"],
["ssire","ssdam"],

["sdam","sdsire"],
["sdam","sddam"],

["dsire","dssire"],
["dsire","dsdam"],

["ddam","ddsire"],
["ddam","dddam"]
]


function makeEl(tag,attrs={}){

const el=document.createElementNS("http://www.w3.org/2000/svg",tag)

for(const k in attrs){
el.setAttribute(k,attrs[k])
}

return el

}



function drawLine(layer,a,b){

layer.appendChild(
makeEl("line",{
x1:a.x+boxW,
y1:a.y+boxH/2,
x2:b.x,
y2:b.y+boxH/2,
stroke:"#000",
"stroke-width":1.5
})
)

}



function drawBox(layer,id,pos){

layer.appendChild(

makeEl("rect",{
x:pos.x,
y:pos.y,
width:boxW,
height:boxH,
fill:"white",
stroke:"black",
rx:8
})

)

}



function buildTree(){

treeLines.innerHTML=""
treeBoxes.innerHTML=""

parentMap.forEach(([c,p])=>{
drawLine(treeLines,positions[c],positions[p])
})

Object.keys(positions).forEach(id=>{
drawBox(treeBoxes,id,positions[id])
})

treeBuilt=true

}



function clearStyleLayers(){

borderLayer.innerHTML=""
watermarkLayer.innerHTML=""
headerLayer.innerHTML=""
footerLayer.innerHTML=""

}



function drawBorder(){

borderLayer.appendChild(
makeEl("rect",{
x:20,
y:20,
width:1200,
height:900,
stroke:"#234a57",
"stroke-width":6,
fill:"none"
})
)

}



function drawWatermark(){

if(!document.getElementById("toggle-watermark").checked) return

watermarkLayer.appendChild(
makeEl("text",{
x:600,
y:500,
"font-size":120,
"text-anchor":"middle",
opacity:0.05
})
).textContent="ShowTails"

}



function drawHeader(){

headerLayer.appendChild(
makeEl("text",{
x:100,
y:80,
"font-size":30
})
).textContent="Rabbit Pedigree"

}



function drawFooter(){

footerLayer.appendChild(
makeEl("text",{
x:600,
y:940,
"text-anchor":"middle",
"font-size":14
})
).textContent="Built with ShowTails"

}



function render(){

clearStyleLayers()

drawBorder()
drawWatermark()
drawHeader()
drawFooter()

}



function initPanZoom(){

panZoom=svgPanZoom(svg,{
viewportSelector:"#viewport",
panEnabled:true,
zoomEnabled:true,
controlIconsEnabled:false,
fit:true,
center:true,
minZoom:.3,
maxZoom:10
})

}



document.getElementById("menu-toggle").onclick=()=>{

document.getElementById("pedigree-menu")
.classList.toggle("open")

}



document.querySelectorAll("#pedigree-menu input")
.forEach(el=>{
el.addEventListener("change",render)
})



window.onload=()=>{

buildTree()

render()

initPanZoom()

}



</script>

</body>
</html>
