<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pedigree-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none !important;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 340px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .menu-note { font-size: 12px; color: #5f7280; margin-bottom: 12px; line-height: 1.35; }
    .menu-section { border-top: 1px solid #e9eef2; padding-top: 12px; margin-top: 12px; }
    .menu-section label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .menu-section select, .menu-section input, .menu-section button { width: 100%; box-sizing: border-box; }
    
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .range-readout { font-size: 12px; color: #617483; margin: 4px 0 8px; }

    .menu-actions { display: flex; flex-direction: column; gap: 8px; }
    .menu-actions button { padding: 10px 12px; border: none; border-radius: 9px; font-weight: 700; cursor: pointer; color: #fff; }
    #menu-save-btn { background: #2f6f86; }
    #menu-print-btn { background: #234a57; }
    #menu-image-btn { background: #4d7c8a; }
    #menu-svg-btn { background: #5d8d99; }
    #reset-styles-btn { background: #eaf2f6; color: #234a57; }

    .font-picker-button {
      width: 100%; min-height: 40px; padding: 10px 12px; border: 1px solid #cfd9e1; border-radius: 8px;
      background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .font-picker-dropdown {
      position: absolute; background: #fff; border: 1px solid #cfd9e1; border-radius: 10px;
      max-height: 240px; overflow-y: auto; display: none; width: 310px; z-index: 10030;
    }
    .font-picker.open .font-picker-dropdown { display: block; }
    .font-option { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #eef2f6; }

    @media print {
      body, html { overflow: visible !important; height: auto !important; width: auto !important; margin: 0 !important; }
      #menu-toggle, #pedigree-menu { display: none !important; }
    }
  </style>
</head>
<body>

  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-save-btn" type="button">Save Settings</button>
        <button id="menu-print-btn" type="button">Print</button>
        <button id="menu-image-btn" type="button">Save PNG</button>
        <button id="menu-svg-btn" type="button">Save SVG</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div id="save-status" class="menu-note" style="margin-top:8px;"></div>
    </div>

    <div class="menu-section">
      <label for="layout-orientation">Pedigree Layout</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>
    </div>

    <div class="menu-section">
      <label for="border-style">Border Style</label>
      <select id="border-style">
        <option value="classicDouble">Classic Double</option>
        <option value="elegantCorners">Elegant Corners</option>
        <option value="ribbonFrame">Ribbon Frame</option>
        <option value="royalArch">Royal Arch</option>
        <option value="modernGeo">Modern Geometric</option>
        <option value="scallop">Scallop</option>
        <option value="ornateLines">Ornate Lines</option>
        <option value="ticketEdge">Ticket Edge</option>
        <option value="floralLite">Floral Lite</option>
        <option value="showFrame">Show Frame</option>
      </select>
      <label style="margin-top:10px;">Primary Color</label>
      <input type="color" id="border-primary-color" value="#234a57">
      <label style="margin-top:10px;">Secondary Color</label>
      <input type="color" id="border-secondary-color" value="#d8c79a">
    </div>

    <div class="menu-section">
      <label>Font Style</label>
      <div class="font-picker" id="fontPicker">
        <button type="button" class="font-picker-button" id="fontPickerButton">
          <span id="selectedFontPreview">Arial</span>
          <span>▾</span>
        </button>
        <div class="font-picker-dropdown" id="fontPickerDropdown">
          <div class="font-option" data-font="Arial, sans-serif">Arial</div>
          <div class="font-option" data-font="'Poppins', sans-serif">Poppins</div>
          <div class="font-option" data-font="'Inter', sans-serif">Inter</div>
          <div class="font-option" data-font="'Georgia', serif">Georgia</div>
        </div>
      </div>
      <label style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">
    </div>

    <div class="menu-section">
      <label>Box Dimensions</label>
      <input type="range" id="box-width" min="180" max="320" value="220">
      <div class="range-readout">Width: <span id="box-width-value">220</span>px</div>
      <input type="range" id="box-height" min="110" max="190" value="125">
      <div class="range-readout">Height: <span id="box-height-value">125</span>px</div>
    </div>
  </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport"></g>
    </svg>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

  <script>
    (function () {
      const svgNS = "http://www.w3.org/2000/svg";
      const xlinkNS = "http://www.w3.org/1999/xlink";
      const svg = document.getElementById("pedigree-svg");
      const viewport = document.getElementById("viewport");
      const container = document.getElementById("pedigree-container");

      // --- CONFIG & DEFAULTS ---
      const boxDefs = [
        { id: "main", gen: 1, sexType: "main", titleChain: ["crabbitry","name"], fields: [["Color","color"],["Ear#","ear number"]] },
        { id: "sire", gen: 2, sexType: "male", titleChain: ["srabbitry","sire"], fields: [["Color","scolor"],["Ear#","sear"]] },
        { id: "dam",  gen: 2, sexType: "female", titleChain: ["drabbitry","dam"], fields: [["Color","dcolor"],["Ear#","dear"]] },
        { id: "ssire", gen: 3, sexType: "male", titleChain: ["ssrabbitry","ssire"], fields: [["Color","sscolor"]] },
        { id: "sdam",  gen: 3, sexType: "female", titleChain: ["sdrabbitry","sdam"], fields: [["Color","sdcolor"]] },
        { id: "dsire", gen: 3, sexType: "male", titleChain: ["dsrabbitry","dsire"], fields: [["Color","dscolor"]] },
        { id: "ddam",  gen: 3, sexType: "female", titleChain: ["ddrabbitry","ddam"], fields: [["Color","ddcolor"]] }
      ];

      const parentMap = [["main","sire"],["main","dam"],["sire","ssire"],["sire","sdam"],["dam","dsire"],["dam","ddam"]];

      let panZoom = null;

      // --- UTILITIES ---
      function getParam(name) {
        const p = new URLSearchParams(window.location.search);
        return p.get(name) || name.toUpperCase(); // Placeholder if empty
      }

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        for (let k in attrs) {
            if (k === "href") el.setAttributeNS(xlinkNS, "href", attrs[k]);
            else el.setAttribute(k, attrs[k]);
        }
        return el;
      }

      // --- DRAWING FUNCTIONS ---
      function drawBorder(group, width, height) {
        const style = document.getElementById("border-style").value;
        const p = document.getElementById("border-primary-color").value;
        const s = document.getElementById("border-secondary-color").value;
        const margin = 40;

        group.appendChild(makeEl("rect", { x: 0, y: 0, width, height, fill: "#fff" }));
        group.appendChild(makeEl("rect", { 
            x: margin, y: margin, width: width - margin*2, height: height - margin*2, 
            fill: "none", stroke: p, "stroke-width": 8 
        }));
        group.appendChild(makeEl("rect", { 
            x: margin + 15, y: margin + 15, width: width - (margin+15)*2, height: height - (margin+15)*2, 
            fill: "none", stroke: s, "stroke-width": 2 
        }));
      }

      function drawBox(group, id, x, y, w, h) {
        const fontCol = document.getElementById("font-color").value;
        const fontFam = document.getElementById("selectedFontPreview").style.fontFamily || "Arial";
        
        const rect = makeEl("rect", { x, y, width: w, height: h, rx: 8, fill: "#f9f9f9", stroke: "#ccc" });
        group.appendChild(rect);

        const text = makeEl("text", { x: x + 10, y: y + 25, fill: fontCol });
        text.style.fontFamily = fontFam;
        text.style.fontWeight = "bold";
        text.textContent = getParam(id);
        group.appendChild(text);
      }

      function drawLine(group, x1, y1, x2, y2) {
        group.appendChild(makeEl("line", { x1, y1, x2, y2, stroke: "#000", "stroke-width": 1.5 }));
      }

      // --- CORE RENDERER ---
      function render(keepZoom = false) {
        const currentState = panZoom && keepZoom ? { pan: panZoom.getPan(), zoom: panZoom.getZoom() } : null;
        
        if (panZoom) { panZoom.destroy(); panZoom = null; }
        while (viewport.firstChild) viewport.removeChild(viewport.firstChild);

        const isPortrait = document.getElementById("layout-orientation").value === "portrait";
        const canvasW = isPortrait ? 1275 : 1650;
        const canvasH = isPortrait ? 1650 : 1275;
        const boxW = parseInt(document.getElementById("box-width").value);
        const boxH = parseInt(document.getElementById("box-height").value);

        svg.setAttribute("viewBox", `0 0 ${canvasW} ${canvasH}`);

        const borderLayer = makeEl("g");
        const lineLayer = makeEl("g");
        const boxLayer = makeEl("g");
        viewport.append(borderLayer, lineLayer, boxLayer);

        drawBorder(borderLayer, canvasW, canvasH);

        // Simple positioning logic
        const positions = {
            main: { x: 100, y: canvasH / 2 - boxH / 2 },
            sire: { x: 450, y: canvasH / 4 - boxH / 2 },
            dam:  { x: 450, y: (canvasH / 4) * 3 - boxH / 2 },
            ssire: { x: 800, y: canvasH / 8 - boxH / 2 },
            sdam:  { x: 800, y: (canvasH / 8) * 3 - boxH / 2 },
            dsire: { x: 800, y: (canvasH / 8) * 5 - boxH / 2 },
            ddam:  { x: 800, y: (canvasH / 8) * 7 - boxH / 2 }
        };

        parentMap.forEach(([c, p]) => {
            const p1 = positions[c], p2 = positions[p];
            drawLine(lineLayer, p1.x + boxW, p1.y + boxH/2, p2.x, p2.y + boxH/2);
        });

        boxDefs.forEach(def => {
            if (positions[def.id]) {
                drawBox(boxLayer, def.id, positions[def.id].x, positions[def.id].y, boxW, boxH);
            }
        });

        // Initialize Pan-Zoom
        panZoom = svgPanZoom(svg, {
          viewportSelector: "#viewport",
          panEnabled: true,
          zoomEnabled: true,
          fit: true,
          center: true
        });

        if (currentState) {
            panZoom.zoom(currentState.zoom);
            panZoom.pan(currentState.pan);
        }

        document.getElementById("box-width-value").textContent = boxW;
        document.getElementById("box-height-value").textContent = boxH;
      }

      // --- PRINT FLOW (THE FIX) ---
      async function runPrintFlow() {
        document.getElementById("save-status").textContent = "Preparing print...";
        
        // 1. Clone the current state
        const clone = svg.cloneNode(true);
        const cloneViewport = clone.querySelector("#viewport");
        
        // 2. IMPORTANT: Remove the zoom/pan transform for the printout
        if (cloneViewport) cloneViewport.removeAttribute("transform");

        const isPortrait = document.getElementById("layout-orientation").value === "portrait";
        const svgMarkup = new XMLSerializer().serializeToString(clone);

        const printWin = window.open("", "_blank");
        printWin.document.write(`
          <html>
            <head>
              <style>
                @page { size: ${isPortrait ? "8.5in 11in portrait" : "11in 8.5in landscape"}; margin: 0; }
                body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
                svg { width: 100%; height: 100%; }
              </style>
            </head>
            <body>${svgMarkup}</body>
          </html>
        `);
        printWin.document.close();
        
        printWin.onload = () => {
            setTimeout(() => {
                printWin.print();
                document.getElementById("save-status").textContent = "";
            }, 500);
        };
      }

      // --- UI EVENTS ---
      document.getElementById("menu-toggle").addEventListener("click", () => document.getElementById("pedigree-menu").classList.toggle("open"));
      document.getElementById("menu-print-btn").addEventListener("click", runPrintFlow);
      document.getElementById("layout-orientation").addEventListener("change", () => render(false));
      document.getElementById("border-style").addEventListener("change", () => render(true));
      document.getElementById("box-width").addEventListener("input", () => render(true));
      document.getElementById("box-height").addEventListener("input", () => render(true));
      
      document.getElementById("fontPickerButton").addEventListener("click", () => document.getElementById("fontPicker").classList.toggle("open"));
      document.querySelectorAll(".font-option").forEach(opt => {
          opt.addEventListener("click", () => {
              const f = opt.dataset.font;
              document.getElementById("selectedFontPreview").textContent = opt.textContent;
              document.getElementById("selectedFontPreview").style.fontFamily = f;
              document.getElementById("fontPicker").classList.remove("open");
              render(true);
          });
      });

      window.onload = () => render(false);
    })();
  </script>
</body>
</html>
