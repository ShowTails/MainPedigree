<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: white;
    }

    svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      margin: 0 auto !important;
      background: white !important;
      page-break-inside: avoid !important;
      touch-action: none !important;
      -ms-touch-action: none !important;
    }

    #background-image,
    #watermark-image,
    #rabbit-photo {
      pointer-events: none;
    }

    .box {
      rx: 10;
      ry: 10;
      stroke: black;
      stroke-width: 1.5;
      fill: white;
    }

    .main-rabbit-box { fill: #ffffff; }
    .male { fill: #cce5ff; }
    .female { fill: #f8d7da; }

    text {
      font-size: 14px;
      font-family: Arial, sans-serif;
      fill: #000000;
    }

    .name { font-weight: bold; font-size: 16px; }
    .title { font-weight: bold; font-size: 20px; }

    .credit {
      font-size: 12px;
      fill: #000;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #ffffff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 290px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label,
    .menu-section .section-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #ffffff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    #menu-print-btn {
      background: #234a57;
      color: #ffffff;
    }

    #reset-styles-btn {
      background: #eaf2f6;
      color: #234a57;
    }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
      box-sizing: border-box;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #ffffff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @page {
      size: 11in 8.5in landscape;
      margin: 0;
    }

    @media print {
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background: white;
      }

      #pedigree-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        background: white;
        overflow: hidden;
      }

      svg {
        width: 100% !important;
        height: 100% !important;
        transform: none !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
      }

      #pedigree-container svg {
        transform: scale(1) translate(0, 0) !important;
        position: absolute !important;
        top: 0;
        left: 0;
      }

      #pedigree-container > * {
        transform: none !important;
      }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
        visibility: hidden !important;
      }
    }
  </style>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      const value = params.get(name) || '';
      return value
        .replaceAll('+', ' ')
        .replace(/%26/g, '&')
        .replace(/%27/g, "'")
        .replace(/%20/g, ' ')
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</head>

    <div class="menu-section">

      <select id="layout-orientation">
        <option value="landscape">Landscape</option>

      <label for="box-width-scale">Box Width</label>
      <input type="range" id="box-width-scale" min="85" max="115" step="1" value="100">

      <label for="box-height-scale">Box Height</label>

      <div class="range-readout"><span id="box-height-scale-value">100</span>%</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Watermark</span>
        <input type="checkbox" id="toggle-watermark">
      </div>

      <label for="watermark-opacity">Watermark Opacity</label>

    <div class="menu-section">

        <input type="checkbox" id="toggle-rabbit-photo">
      </div>
      <div class="menu-note" style="margin-bottom:0;">Image query parameter: <strong>rabbitphoto</strong></div>
    </div>

    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-print-btn" type="button">Print / Save PDF</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
    </div>
  </div>

  <script src="pedigree.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const svg = document.getElementById('pedigree-svg');
      const container = document.getElementById('pedigree-container');
      const pedigreeRoot = document.getElementById('pedigree-root');
      const watermarkImage = document.getElementById('watermark-image');
      const rabbitPhotoGroup = document.getElementById('rabbit-photo-group');
      const rabbitPhoto = document.getElementById('rabbit-photo');

      const menuToggle = document.getElementById('menu-toggle');
      const pedigreeMenu = document.getElementById('pedigree-menu');

      const colorPreset = document.getElementById('color-preset');
      const mainBoxColor = document.getElementById('main-box-color');
      const maleBoxColor = document.getElementById('male-box-color');
      const femaleBoxColor = document.getElementById('female-box-color');
      const fontColor = document.getElementById('font-color');
      const layoutOrientation = document.getElementById('layout-orientation');
      const boxWidthScale = document.getElementById('box-width-scale');
      const boxHeightScale = document.getElementById('box-height-scale');
      const boxWidthScaleValue = document.getElementById('box-width-scale-value');
      const boxHeightScaleValue = document.getElementById('box-height-scale-value');
      const toggleWatermark = document.getElementById('toggle-watermark');
      const watermarkOpacity = document.getElementById('watermark-opacity');
      const watermarkSize = document.getElementById('watermark-size');
      const watermarkOpacityValue = document.getElementById('watermark-opacity-value');
      const watermarkSizeValue = document.getElementById('watermark-size-value');
      const toggleRabbitPhoto = document.getElementById('toggle-rabbit-photo');
      const resetStylesBtn = document.getElementById('reset-styles-btn');

      const fontPicker = document.getElementById('fontPicker');
      const fontPickerButton = document.getElementById('fontPickerButton');
      const selectedFontPreview = document.getElementById('selectedFontPreview');
      const fontOptions = document.querySelectorAll('.font-option');
      const printBtn = document.getElementById('menu-print-btn');
      const printPageStyle = document.getElementById('print-page-style');

      let panZoom = null;
      let initialized = false;

      const defaults = {
        preset: 'custom',
        main: '#ffffff',
        male: '#cce5ff',
        female: '#f8d7da',
        fontColor: '#000000',
        fontFamily: 'Arial, sans-serif',
        layout: 'landscape',
        widthScale: 100,
        heightScale: 100,
        watermarkEnabled: false,
        watermarkOpacity: 0.10,
        watermarkSize: 55,
        rabbitPhotoEnabled: false
      };

      const presets = {
        classicBlue: { main: '#eef5ff', male: '#cce5ff', female: '#f8d7da' },
        softPastel: { main: '#fff7df', male: '#dbeafe', female: '#fce7f3' },
        earthy: { main: '#efe3d3', male: '#d8e2dc', female: '#ead7d1' },
        monochrome: { main: '#dbeafe', male: '#c7d2fe', female: '#e0e7ff' },
        showtails: { main: '#e9f4f8', male: '#cfe6ef', female: '#eadde9' }
      };

      function validBox(vb) {
        return vb && isFinite(vb.width) && vb.width > 0 && isFinite(vb.height) && vb.height > 0;
      }

      function setSvgImage(id, paramName) {
        const url = params.get(paramName);
        if (!url) return;
        const decoded = decodeURIComponent(url);
        const el = document.getElementById(id);
        if (!el) return;
        el.setAttribute('href', decoded);
        el.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', decoded);
      }

      function getBoxScaleX() {
        return Number(boxWidthScale.value || 100) / 100;
      }

      function getBoxScaleY() {
        return Number(boxHeightScale.value || 100) / 100;
      }

      function applyRootTransform() {
        const sx = getBoxScaleX();
        const sy = getBoxScaleY();

        if (layoutOrientation.value === 'portrait') {
          const portraitScale = 0.86;
          const portraitX = 110;
          const portraitY = 8;
          pedigreeRoot.setAttribute(
            'transform',
            'translate(' + portraitX + ', ' + portraitY + ') scale(' + (sx * portraitScale) + ', ' + (sy * 1.02) + ')'
          );
        } else {
          pedigreeRoot.setAttribute('transform', 'scale(' + sx + ', ' + sy + ')');
        }
      }

      function applyBoxColors(main, male, female) {
        document.querySelectorAll('#main-rabbit-box').forEach(el => {
          el.style.fill = main;
        });

        document.querySelectorAll('.box.male').forEach(el => {
          el.style.fill = male;
        });

        document.querySelectorAll('.box.female').forEach(el => {
          el.style.fill = female;
        });

        mainBoxColor.value = main;
        maleBoxColor.value = male;
        femaleBoxColor.value = female;
      }

      function applyFontColor(color) {
        svg.querySelectorAll('text').forEach(el => {
          el.style.fill = color;
        });
        fontColor.value = color;
      }

      function applyFont(fontValue) {
        svg.querySelectorAll('text').forEach(el => {
          el.style.fontFamily = fontValue;
        });
        selectedFontPreview.textContent = getFontLabel(fontValue);
        selectedFontPreview.style.fontFamily = fontValue;
        document.documentElement.style.setProperty('--menu-font', fontValue);
        setActiveFontOption(fontValue);
      }

      function getFontLabel(fontValue) {
        const option = Array.from(fontOptions).find(opt => opt.dataset.font === fontValue);
        return option ? option.textContent.trim() : 'Arial';
      }

      function setActiveFontOption(fontValue) {
        fontOptions.forEach(opt => {
          opt.classList.toggle('active', opt.dataset.font === fontValue);
        });
      }

      function setCustomMode() {
        colorPreset.value = 'custom';
      }

      function updateScaleReadouts() {
        boxWidthScaleValue.textContent = boxWidthScale.value;
        boxHeightScaleValue.textContent = boxHeightScale.value;
      }

      function updatePrintStyle() {
        if (layoutOrientation.value === 'portrait') {
          printPageStyle.textContent = '@page { size: 8.5in 11in portrait; margin: 0; }';
        } else {
          printPageStyle.textContent = '@page { size: 11in 8.5in landscape; margin: 0; }';
        }
      }

      function updateWatermarkVisibility() {
        const href =
          watermarkImage.getAttribute('href') ||
          watermarkImage.getAttributeNS('http://www.w3.org/1999/xlink', 'href') ||
          '';

        watermarkImage.style.display = (toggleWatermark.checked && href) ? 'block' : 'none';
      }

      function updateWatermarkOpacity() {
        watermarkImage.style.opacity = watermarkOpacity.value;
        watermarkOpacityValue.textContent = Number(watermarkOpacity.value).toFixed(2);
      }

      function updateWatermarkSize() {
        const pct = Number(watermarkSize.value);
        const size = 1200 * (pct / 100);
        const x = (1750 - size) / 2 - 80;
        const y = (1060 - size) / 2 - 60;

        watermarkImage.setAttribute('width', size);
        watermarkImage.setAttribute('height', size);
        watermarkImage.setAttribute('x', x);
        watermarkImage.setAttribute('y', y);

        watermarkSizeValue.textContent = pct;
      }

      function updateRabbitPhotoVisibility() {
        const href =
          rabbitPhoto.getAttribute('href') ||
          rabbitPhoto.getAttributeNS('http://www.w3.org/1999/xlink', 'href') ||
          '';

        rabbitPhotoGroup.style.display = (toggleRabbitPhoto.checked && href) ? 'block' : 'none';
      }

      function computeFit() {
        const vb = svg.viewBox.baseVal;
        if (!validBox(vb)) return null;

        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!cw || !ch) return null;

        const scale = Math.min(cw / vb.width, ch / vb.height);
        if (!isFinite(scale) || scale <= 0) return null;

        return {
          scale,
          pan: {
            x: (cw - vb.width * scale) / 2,
            y: (ch - vb.height * scale) / 2
          }
        };
      }

      window.computeFit = computeFit;

      function fitToContainer() {
        if (!panZoom) return;
        const fit = computeFit();
        if (!fit) return;
        panZoom.zoom(fit.scale);
        panZoom.pan(fit.pan);
      }

      function wireWheelZoom() {
        container.addEventListener('wheel', (e) => {
          if (!panZoom) return;
          const rect = svg.getBoundingClientRect();
          const point = { x: e.clientX - rect.left, y: e.clientY - rect.top };
          const delta = e.deltaY;
          const factor = delta > 0 ? 0.9 : 1.1;
          e.preventDefault();
          if (isFinite(point.x) && isFinite(point.y)) {
            panZoom.zoomAtPoint(factor, point);
          }
        }, { passive: false });
      }

      function enablePointerPan() {
        let isPanning = false;
        let start = { x: 0, y: 0 };

        svg.addEventListener('pointerdown', (e) => {
          isPanning = true;
          start = { x: e.clientX, y: e.clientY };
          svg.setPointerCapture(e.pointerId);
        });

        svg.addEventListener('pointermove', (e) => {
          if (!isPanning || !panZoom) return;
          const dx = e.clientX - start.x;
          const dy = e.clientY - start.y;
          panZoom.panBy({ x: dx, y: dy });
          start = { x: e.clientX, y: e.clientY };
        });

        svg.addEventListener('pointerup', () => (isPanning = false));
        svg.addEventListener('pointercancel', () => (isPanning = false));
      }

      function enablePinchZoom() {
        let pinchStart = null;
        let startZoom = 1;

        svg.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2 && window.panZoomInstance) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStart = Math.hypot(dx, dy);
            startZoom = window.panZoomInstance.getZoom();
          }
        }, { passive: false });

        svg.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2 && window.panZoomInstance && pinchStart) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const pinchNow = Math.hypot(dx, dy);
            const zoomRatio = pinchNow / pinchStart;

            const rect = svg.getBoundingClientRect();
            const mid = {
              x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
              y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top,
            };

            window.panZoomInstance.zoomAtPoint(startZoom * zoomRatio, mid);
          }
        }, { passive: false });

        svg.addEventListener('touchend', () => {
          pinchStart = null;
        });
      }

      function tryInit() {
        if (initialized) return;

        if (typeof window.svgPanZoom !== 'function') {
          console.error('svg-pan-zoom not loaded. If this only happens inside Glide, host the script yourself or allow this CDN.');
          return;
        }

        const vb = svg.viewBox.baseVal;
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!validBox(vb) || !cw || !ch) return;

        panZoom = svgPanZoom(svg, {
          panEnabled: true,
          zoomEnabled: true,
          mouseWheelZoomEnabled: true,
          controlIconsEnabled: false,
          fit: false,
          center: true,
          minZoom: 0.25,
          maxZoom: 10,
          dblClickZoomEnabled: true,
          onUpdatedCTM: function() {}
        });

        window.panZoomInstance = panZoom;
        fitToContainer();
        enablePointerPan();
        enablePinchZoom();
        wireWheelZoom();
        initialized = true;
      }

      function refreshAfterLayoutChange() {
        applyRootTransform();
        updatePrintStyle();

        if (window.panZoomInstance) {
          setTimeout(() => {
            fitToContainer();
          }, 30);
        }
      }

      function resetForPrint() {
        const inst = window.panZoomInstance;
        if (!inst) return;

        window._savedState = { pan: inst.getPan(), zoom: inst.getZoom() };
        inst.resetZoom();
        inst.center();

        if (layoutOrientation.value === 'portrait') {
          inst.zoom(1.15);
          inst.pan({ x: 120, y: 70 });
        } else {
          inst.zoom(1.45);
          inst.pan({ x: 55, y: 125 });
        }
      }

      function restoreAfterPrint() {
        const inst = window.panZoomInstance;
        const s = window._savedState;
        if (inst && s) {
          inst.zoom(s.zoom);
          inst.pan(s.pan);
        }
      }

      menuToggle.addEventListener('click', () => {
        pedigreeMenu.classList.toggle('open');
      });

      document.addEventListener('click', (event) => {
        if (!pedigreeMenu.contains(event.target) && event.target !== menuToggle) {
          pedigreeMenu.classList.remove('open');
        }
      });

      fontPickerButton.addEventListener('click', (e) => {
        e.stopPropagation();
        fontPicker.classList.toggle('open');
      });

      fontOptions.forEach(option => {
        option.addEventListener('click', () => {
          applyFont(option.dataset.font);
          fontPicker.classList.remove('open');
        });
      });

      document.addEventListener('click', (event) => {
        if (!fontPicker.contains(event.target)) {
          fontPicker.classList.remove('open');
        }
      });

      colorPreset.addEventListener('change', () => {
        const selected = colorPreset.value;
        if (selected === 'custom') return;
        const preset = presets[selected];
        if (!preset) return;
        applyBoxColors(preset.main, preset.male, preset.female);
      });

      mainBoxColor.addEventListener('input', () => {
        document.querySelectorAll('#main-rabbit-box').forEach(el => {
          el.style.fill = mainBoxColor.value;
        });
        setCustomMode();
      });

      maleBoxColor.addEventListener('input', () => {
        document.querySelectorAll('.box.male').forEach(el => {
          el.style.fill = maleBoxColor.value;
        });
        setCustomMode();
      });

      femaleBoxColor.addEventListener('input', () => {
        document.querySelectorAll('.box.female').forEach(el => {
          el.style.fill = femaleBoxColor.value;
        });
        setCustomMode();
      });

      fontColor.addEventListener('input', () => {
        applyFontColor(fontColor.value);
      });

      layoutOrientation.addEventListener('change', () => {
        refreshAfterLayoutChange();
      });

      boxWidthScale.addEventListener('input', () => {
        updateScaleReadouts();
        refreshAfterLayoutChange();
      });

      boxHeightScale.addEventListener('input', () => {
        updateScaleReadouts();
        refreshAfterLayoutChange();
      });

      toggleWatermark.addEventListener('change', updateWatermarkVisibility);
      watermarkOpacity.addEventListener('input', updateWatermarkOpacity);
      watermarkSize.addEventListener('input', updateWatermarkSize);

      toggleRabbitPhoto.addEventListener('change', updateRabbitPhotoVisibility);

      resetStylesBtn.addEventListener('click', () => {
        colorPreset.value = defaults.preset;
        applyBoxColors(defaults.main, defaults.male, defaults.female);

        applyFont(defaults.fontFamily);
        applyFontColor(defaults.fontColor);

        layoutOrientation.value = defaults.layout;
        boxWidthScale.value = defaults.widthScale;
        boxHeightScale.value = defaults.heightScale;
        updateScaleReadouts();
        refreshAfterLayoutChange();

        toggleWatermark.checked = defaults.watermarkEnabled;
        watermarkOpacity.value = defaults.watermarkOpacity;
        watermarkSize.value = defaults.watermarkSize;
        updateWatermarkOpacity();
        updateWatermarkSize();
        updateWatermarkVisibility();

        toggleRabbitPhoto.checked = defaults.rabbitPhotoEnabled;
        updateRabbitPhotoVisibility();
      });

      setSvgImage('logo', 'logo');
      setSvgImage('signature', 'signature');
      setSvgImage('background-image', 'background-image');
      setSvgImage('watermark-image', 'logo');
      setSvgImage('rabbit-photo', 'rabbitphoto');

      applyBoxColors(defaults.main, defaults.male, defaults.female);
      applyFont(defaults.fontFamily);
      applyFontColor(defaults.fontColor);
      updateScaleReadouts();
      applyRootTransform();
      updatePrintStyle();
      updateWatermarkOpacity();
      updateWatermarkSize();
      updateWatermarkVisibility();
      updateRabbitPhotoVisibility();

      const ro = new ResizeObserver(() => {
        if (!initialized) tryInit();
        else fitToContainer();
      });
      ro.observe(container);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          if (!initialized) tryInit();
          else fitToContainer();
        }
      });

      window.addEventListener('load', tryInit);

      window.addEventListener('beforeprint', resetForPrint);
      window.addEventListener('afterprint', restoreAfterPrint);

      printBtn.addEventListener('click', () => {
        resetForPrint();
        requestAnimationFrame(() => {
          setTimeout(() => {
            window.print();
            setTimeout(restoreAfterPrint, 800);
          }, 200);
        });
      });

      printBtn.addEventListener('click', (event) => {
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        if (!isMobile) return;

        event.preventDefault();

        const inst = window.panZoomInstance;
        if (!container || !inst) return;

        const savedState = { pan: inst.getPan(), zoom: inst.getZoom() };

        inst.resetZoom();
        if (layoutOrientation.value === 'portrait') {
          inst.zoom(2.05);
          inst.pan({ x: 110, y: 70 });
        } else {
          inst.zoom(2.65);
          inst.pan({ x: 65, y: 100 });
        }

        requestAnimationFrame(() => {
          const svgMarkup = container.innerHTML;

          inst.zoom(savedState.zoom);
          inst.pan(savedState.pan);

          const styleBlocks = Array.from(document.querySelectorAll('style'))
            .map(styleEl => styleEl.outerHTML)
            .join('\n');

          const popup = window.open('', '_blank', 'width=1200,height=800');
          if (!popup) {
            alert('Please allow pop-ups for ShowTails to print pedigrees.');
            return;
          }

          const pageStyle = layoutOrientation.value === 'portrait'
            ? '@page { size: portrait; margin: 0; } html, body { width: 7.4in; height: 10.25in; } #pedigree-container { width: 7.4in; height: 10.25in; } svg { width: 7.4in !important; height: 10.25in !important; }'
            : '@page { size: landscape; margin: 0; } html, body { width: 10.25in; height: 7.4in; } #pedigree-container { width: 10.25in; height: 7.4in; } svg { width: 10.25in !important; height: 7.4in !important; }';

          popup.document.write(`
            <html>
              <head>
                <title>Print Pedigree</title>
                <meta name="viewport" content="width=device-width, initial-scale=1.2">
                ${styleBlocks}
                <style>
                  ${pageStyle}
                  html, body {
                    overflow: hidden;
                    margin: 0;
                    padding: 0;
                    background: white;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  }
                  #pedigree-container {
                    margin: 0;
                    padding: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    overflow: hidden;
                  }
                  svg {
                    background: white !important;
                    margin: 0;
                    display: block;
                    transform: none !important;
                  }
                </style>
              </head>
              <body>
                <div id="pedigree-container">${svgMarkup}</div>
              </body>
            </html>
          `);
          popup.document.close();

          setTimeout(() => {
            popup.focus();
            popup.print();
            setTimeout(() => popup.close(), 1500);
          }, 600);
        });
      });
    })();
  </script>
</body>
</html>
