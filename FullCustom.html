<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pedigree-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none !important;
    }

    /* UI ELEMENTS */
    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 340px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
    }

    #pedigree-menu.open { display: block; }

    .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .menu-section { border-top: 1px solid #e9eef2; padding-top: 12px; margin-top: 12px; }
    .menu-section label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .menu-section select, .menu-section input, .menu-section button { width: 100%; box-sizing: border-box; }
    
    .menu-actions { display: flex; flex-direction: column; gap: 8px; }
    .menu-actions button { padding: 10px 12px; border: none; border-radius: 9px; font-weight: 700; cursor: pointer; color: #fff; }
    #menu-print-btn { background: #234a57; }
    #menu-save-btn { background: #2f6f86; }
    #reset-styles-btn { background: #eaf2f6; color: #234a57; }

    /* PRINT SPECIFIC CSS */
    @media print {
      body, html { overflow: visible !important; height: auto !important; width: auto !important; margin: 0 !important; }
      #menu-toggle, #pedigree-menu { display: none !important; }
      #pedigree-container { display: block !important; position: static !important; width: 100% !important; height: auto !important; }
      #pedigree-svg { width: 100% !important; height: auto !important; }
      #viewport { transform: none !important; } /* Reset zoom on print */
    }

    .font-picker-button {
      width: 100%; min-height: 40px; padding: 10px 12px; border: 1px solid #cfd9e1; border-radius: 8px;
      background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .font-picker-dropdown {
      position: absolute; background: #fff; border: 1px solid #cfd9e1; border-radius: 10px;
      max-height: 200px; overflow-y: auto; display: none; width: 310px; z-index: 10030;
    }
    .font-picker.open .font-picker-dropdown { display: block; }
    .font-option { padding: 10px; cursor: pointer; }
    .font-option:hover { background: #f0f0f0; }
  </style>
</head>
<body>

  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-print-btn" type="button">Print Pedigree</button>
        <button id="menu-image-btn" style="background:#4d7c8a">Save PNG</button>
        <button id="menu-save-btn" type="button">Save Settings</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div id="save-status" style="font-size:12px; margin-top:5px; color:#5f7280;"></div>
    </div>

    <div class="menu-section">
      <label>Layout Orientation</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>
    </div>
    
    <div class="menu-section">
      <label>Border Style</label>
      <select id="border-style">
        <option value="classicDouble">Classic Double</option>
        <option value="elegantCorners">Elegant Corners</option>
        <option value="showFrame">Show Frame</option>
      </select>
      <label style="margin-top:10px;">Primary Color</label>
      <input type="color" id="border-primary-color" value="#234a57">
    </div>

    <div class="menu-section">
        <label>Box Dimensions</label>
        <input type="range" id="box-width" min="180" max="320" value="220">
        <div id="box-width-value">220</div>
        <input type="range" id="box-height" min="110" max="190" value="125">
        <div id="box-height-value">125</div>
    </div>
    </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport"></g>
    </svg>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

  <script>
    (function () {
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("pedigree-svg");
      const viewport = document.getElementById("viewport");
      const container = document.getElementById("pedigree-container");
      
      // Control Elements
      const orientationInput = document.getElementById("layout-orientation");
      const borderStyleInput = document.getElementById("border-style");
      const primaryColorInput = document.getElementById("border-primary-color");
      const boxWidthInput = document.getElementById("box-width");
      const boxHeightInput = document.getElementById("box-height");
      const saveStatus = document.getElementById("save-status");

      let panZoom = null;

      // --- HELPER FUNCTIONS ---
      function getParams() { return new URLSearchParams(window.location.search); }
      function getParam(name) { return getParams().get(name) || ""; }

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        for (let k in attrs) el.setAttribute(k, attrs[k]);
        return el;
      }

      // --- PRINT LOGIC (FIXED) ---
      async function runPrintFlow() {
        saveStatus.textContent = "Generating high-res print...";
        
        // 1. Build a clean, static version of the SVG
        const exportSvg = await buildStaticExportSvg();
        const isPortrait = orientationInput.value === "portrait";
        
        // 2. Clear any panning/zooming on the clone
        const cloneViewport = exportSvg.querySelector("#viewport");
        if (cloneViewport) cloneViewport.removeAttribute("transform");

        // 3. Set explicit printing dimensions
        exportSvg.setAttribute("width", "100%");
        exportSvg.setAttribute("height", "100%");
        exportSvg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const svgData = new XMLSerializer().serializeToString(exportSvg);
        
        // 4. Open specialized Print Window
        const printWin = window.open("", "_blank");
        if (!printWin) {
            saveStatus.textContent = "Pop-up blocked! Please allow pop-ups.";
            return;
        }

        printWin.document.write(`
          <html>
            <head>
              <title>Print Pedigree</title>
              <style>
                @page { 
                    size: ${isPortrait ? "8.5in 11in portrait" : "11in 8.5in landscape"}; 
                    margin: 0; 
                }
                body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
                svg { width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; }
              </style>
            </head>
            <body>${svgData}</body>
          </html>
        `);
        printWin.document.close();

        // 5. Wait for browser to parse and trigger print
        printWin.onload = () => {
          setTimeout(() => {
            printWin.focus();
            printWin.print();
            saveStatus.textContent = "Print Ready.";
          }, 800);
        };
      }

      // --- RENDER LOGIC ---
      function render() {
        // Reset Zoom before re-rendering
        if (panZoom) {
            panZoom.destroy();
            panZoom = null;
        }
        while (viewport.firstChild) viewport.removeChild(viewport.firstChild);
        viewport.removeAttribute("transform");

        const isPortrait = orientationInput.value === "portrait";
        const width = isPortrait ? 1275 : 1650;
        const height = isPortrait ? 1650 : 1275;

        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        // Drawing code... (Insert your drawBox, drawLine, drawBorder calls here)
        const rect = makeEl("rect", { 
            x: 50, y: 50, width: width-100, height: height-100, 
            fill: "none", stroke: primaryColorInput.value, "stroke-width": 5 
        });
        viewport.appendChild(rect);

        // Re-init Pan Zoom for live view
        panZoom = svgPanZoom(svg, {
          viewportSelector: "#viewport",
          panEnabled: true,
          zoomEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true
        });
      }

      // Needed for SVG/PNG export to handle external images (Logo/Photo)
      async function buildStaticExportSvg() {
        const clone = svg.cloneNode(true);
        // Add logic to convert external <img> to Base64 data if needed
        return clone;
      }

      // --- EVENT LISTENERS ---
      document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("pedigree-menu").classList.toggle("open");
      });

      document.getElementById("menu-print-btn").addEventListener("click", runPrintFlow);
      
      [orientationInput, borderStyleInput, primaryColorInput, boxWidthInput, boxHeightInput].forEach(el => {
        el.addEventListener("input", render);
      });

      window.addEventListener("resize", () => { if(panZoom) panZoom.resize(); });
      window.onload = render;

    })();
  </script>
</body>
</html>
