<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    #pedigree-svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      margin: 0 auto !important;
      background: #fff !important;
      touch-action: none !important;
      -ms-touch-action: none !important;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 340px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-actions button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #menu-save-btn { background: #2f6f86; color: #fff; }
    #menu-print-btn { background: #234a57; color: #fff; }
    #menu-image-btn { background: #4d7c8a; color: #fff; }
    #menu-svg-btn { background: #5d8d99; color: #fff; }
    #reset-styles-btn { background: #eaf2f6; color: #234a57; }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @media print {
      @page { margin: 0; }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
      }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background: white;
      }

      #pedigree-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        background: white;
        overflow: hidden;
      }

      #pedigree-svg {
        width: 100% !important;
        height: 100% !important;
        transform: none !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
      }

      #viewport {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">
    <div class="menu-title">Pedigree Options</div>
    <div class="menu-note">Choose border styles, colors, fonts, layout settings, and rabbit data visibility below.</div>

    <div class="menu-section">
      <div class="menu-actions">
        <button id="menu-save-btn" type="button">Save Settings</button>
        <button id="menu-print-btn" type="button">Print/SavePDF-Desktop</button>
        <button id="menu-image-btn" type="button">Save PNG-Mobile</button>
        <button id="menu-svg-btn" type="button">Save SVG-Mobile</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div class="menu-note" id="save-status" style="margin-top:8px; margin-bottom:0;"></div>
    </div>

    <div class="menu-section">
      <label for="border-style">Border Style</label>
      <select id="border-style">
        <option value="classicDouble">Victorian Double Frame</option>
        <option value="elegantCorners">Baroque Corner Flourish</option>
        <option value="ribbonFrame">Heraldic Ribbon Crest</option>
        <option value="royalArch">Cathedral Arch</option>
        <option value="modernGeo">Art Deco Geometric</option>
        <option value="scallop">Pearled Scallop</option>
        <option value="ornateLines">Scrollwork Engraved</option>
        <option value="ticketEdge">Plaque & Notched Frame</option>
        <option value="floralLite">Botanical Vine Border</option>
        <option value="showFrame">Championship Showcase</option>
      </select>

      <label for="border-color-preset" style="margin-top:10px;">Border Color Preset</label>
      <select id="border-color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>
      </select>

      <label for="border-primary-color" style="margin-top:10px;">Border Primary Color</label>
      <input type="color" id="border-primary-color" value="#234a57">

      <label for="border-secondary-color" style="margin-top:10px;">Border Secondary Color</label>
      <input type="color" id="border-secondary-color" value="#d8c79a">
    </div>

    <div class="menu-section">
      <label for="color-preset">Preset Male / Female Pairings</label>
      <select id="color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>
      </select>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Main Rabbit Uses Sex Color</span>
        <input type="checkbox" id="main-sex-color-toggle">
      </div>

      <label for="main-box-color">Main Rabbit Box Color</label>
      <input type="color" id="main-box-color" value="#ffffff">

      <label for="male-box-color">Male Box Color</label>
      <input type="color" id="male-box-color" value="#cce5ff">

      <label for="female-box-color">Female Box Color</label>
      <input type="color" id="female-box-color" value="#f8d7da">
    </div>

    <div class="menu-section">
      <label>Rabbit Box Data Visibility</label>
      <div class="toggle-row">
        <span>DOB</span>
        <input type="checkbox" id="toggle-show-dob" checked>
      </div>
      <div class="toggle-row">
        <span>Ear Length</span>
        <input type="checkbox" id="toggle-show-earl" checked>
      </div>
      <div class="toggle-row">
        <span>Custom</span>
        <input type="checkbox" id="toggle-show-custom" checked>
      </div>
      <div class="toggle-row" style="margin-bottom:0;">
        <span>Wins</span>
        <input type="checkbox" id="toggle-show-wins" checked>
      </div>
    </div>

    <div class="menu-section">
      <label>Font Style</label>
      <div class="font-picker" id="fontPicker">
        <button type="button" class="font-picker-button" id="fontPickerButton">
          <span id="selectedFontPreview" style="font-family: Arial, sans-serif;">Arial</span>
          <span class="font-picker-arrow">▾</span>
        </button>
        <div class="font-picker-dropdown" id="fontPickerDropdown">
          <div class="font-option active" data-font="Arial, sans-serif" style="font-family: Arial, sans-serif;">Arial</div>
          <div class="font-option" data-font="'Poppins', sans-serif" style="font-family: 'Poppins', sans-serif;">Poppins</div>
          <div class="font-option" data-font="'Inter', sans-serif" style="font-family: 'Inter', sans-serif;">Inter</div>
          <div class="font-option" data-font="'Georgia', serif" style="font-family: 'Georgia', serif;">Georgia</div>
          <div class="font-option" data-font="'Times New Roman', serif" style="font-family: 'Times New Roman', serif;">Times New Roman</div>
          <div class="font-option" data-font="'Verdana', sans-serif" style="font-family: 'Verdana', sans-serif;">Verdana</div>
          <div class="font-option" data-font="'Courier New', monospace" style="font-family: 'Courier New', monospace;">Courier New</div>
        </div>
      </div>

      <label for="font-color" style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">

      <label for="box-name-font-size" style="margin-top:10px;">Rabbit Name Font Size</label>
      <input type="range" id="box-name-font-size" min="12" max="22" step="1" value="15">
      <div class="range-readout"><span id="box-name-font-size-value">15</span> px</div>

      <label for="box-body-font-size">Box Body Font Size</label>
      <input type="range" id="box-body-font-size" min="9" max="16" step="1" value="11">
      <div class="range-readout"><span id="box-body-font-size-value">11</span> px</div>
    </div>

    <div class="menu-section">
      <label for="layout-orientation">Pedigree Layout</label>
      <select id="layout-orientation">
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
      </select>

      <label for="box-width">Box Width</label>
      <input type="range" id="box-width" min="180" max="320" step="5" value="220">
      <div class="range-readout"><span id="box-width-value">220</span> px</div>

      <label for="box-height">Box Height</label>
      <input type="range" id="box-height" min="110" max="190" step="5" value="125">
      <div class="range-readout"><span id="box-height-value">125</span> px</div>
    </div>

    <div class="menu-section">
      <label for="line-style">Pedigree Line Style</label>
      <select id="line-style">
        <option value="diagonal">Diagonal</option>
        <option value="tree">Standard Tree</option>
      </select>

      <label for="line-color">Line Color</label>
      <input type="color" id="line-color" value="#000000">

      <label for="line-thickness">Line Thickness</label>
      <input type="range" id="line-thickness" min="1" max="6" step="0.5" value="1.5">
      <div class="range-readout"><span id="line-thickness-value">1.5</span> px</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Watermark</span>
        <input type="checkbox" id="toggle-watermark">
      </div>

      <label for="watermark-opacity">Watermark Opacity</label>
      <input type="range" id="watermark-opacity" min="0.03" max="0.30" step="0.01" value="0.10">
      <div class="range-readout"><span id="watermark-opacity-value">0.10</span></div>

      <label for="watermark-size">Watermark Size</label>
      <input type="range" id="watermark-size" min="25" max="95" step="1" value="55">
      <div class="range-readout"><span id="watermark-size-value">55</span>%</div>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <span>Show Rabbit Photo</span>
        <input type="checkbox" id="toggle-rabbit-photo">
      </div>
      <div class="menu-note" style="margin-bottom:0;"><strong></strong></div>
    </div>
  </div>

  <div id="pedigree-container">
    <svg id="pedigree-svg" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport"></g>
    </svg>
  </div>

  <style id="print-page-style">
    @page { size: 11in 8.5in landscape; margin: 0; }
  </style>

      const parentMap = [
        ["main","sire"],["main","dam"],
        ["sire","ssire"],["sire","sdam"],
        ["dam","dsire"],["dam","ddam"],

      function getSearchParams() {
        let search = window.location.search || "";
        while (search.startsWith("?")) search = search.slice(1);
        return new URLSearchParams(search);
      }

      function refreshParams() {
        params = getSearchParams();
      }

      function base64ToUtf8(str) {
        return decodeURIComponent(
          Array.from(atob(str))
            .map(c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0"))
            .join("")
        );
      }

      function loadPackedParams() {
        const search = new URLSearchParams(window.location.search);
        const packed = search.get("p");

        if (!packed) {
          packedParams = null;
          return;
        }

        try {
          packedParams = JSON.parse(base64ToUtf8(decodeURIComponent(packed)));
        } catch (err) {
          console.error("Failed to decode packed pedigree data:", err);
          packedParams = null;
        }
      }

      function getRawParam(name) {
        if (packedParams && Object.prototype.hasOwnProperty.call(packedParams, name)) {
          return packedParams[name] || "";
        }
        return params.get(name) || "";
      }

      function decodeParam(raw) {
        const urlDecoded = decodeURIComponent(String(raw).replace(/\+/g, " "));
        const ta = document.createElement("textarea");
        ta.innerHTML = urlDecoded;
        return ta.value;
      }

      function getParam(name) {
        return decodeParam(getRawParam(name));
      }

      function getUrlParam(name) {
        const raw = getRawParam(name);
        return raw ? decodeURIComponent(raw) : "";
      }

      function getChain(keys) {
        return keys.map(k => getParam(k)).filter(Boolean).join(" ");
      }

      function setPrintPage() {
        if (layoutOrientation.value === "portrait") {
          printPageStyle.textContent = "@page { size: 8.5in 11in portrait; margin: 0; }";
        } else {
          printPageStyle.textContent = "@page { size: 11in 8.5in landscape; margin: 0; }";
        }
      }

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "href") {
            el.setAttributeNS(xlinkNS, "xlink:href", v);
            el.setAttribute("href", v);
          } else {
            el.setAttribute(k, v);
          }
        });
        return el;
      }

      function addText(group, x, y, text, opts = {}) {
        const t = makeEl("text", { x, y, "text-anchor": opts.anchor || "start" });
        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = (opts.size || 14) + "px";
        if (opts.weight) t.style.fontWeight = opts.weight;
        t.textContent = text || "";
        group.appendChild(t);
        return t;
      }

      function clearViewport() {
        while (viewport.firstChild) viewport.removeChild(viewport.firstChild);
      }

      function destroyPanZoom() {
        if (panZoom) {
          try { panZoom.destroy(); } catch (err) {}
          panZoom = null;
        }
        window.panZoomInstance = null;
        initialized = false;
      }

      function validBox(vb) {
        return vb && isFinite(vb.width) && vb.width > 0 && isFinite(vb.height) && vb.height > 0;
      }

      function computeFit() {
        const vb = svg.viewBox.baseVal;
        if (!validBox(vb)) return null;

        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!cw || !ch) return null;

        const scale = Math.min(cw / vb.width, ch / vb.height);
        if (!isFinite(scale) || scale <= 0) return null;

        return {
          scale,
          pan: {
            x: (cw - vb.width * scale) / 2,
            y: (ch - vb.height * scale) / 2
          }
        };
      }

      window.computeFit = computeFit;

      function fitToContainer() {
        if (!panZoom) return;
        const fit = computeFit();
        if (!fit) return;

        panZoom.zoom(fit.scale);
        panZoom.pan(fit.pan);
        lastPanZoomState = {
          zoom: fit.scale,
          pan: { ...fit.pan }
        };
      }

      function capturePanZoomState() {
        if (!panZoom) return lastPanZoomState;
        try {
          const state = {
            zoom: panZoom.getZoom(),
            pan: panZoom.getPan()
          };
          if (
            isFinite(state.zoom) &&
            state.pan &&
            isFinite(state.pan.x) &&
            isFinite(state.pan.y)
          ) {
            lastPanZoomState = {
              zoom: state.zoom,
              pan: { x: state.pan.x, y: state.pan.y }
            };
            return lastPanZoomState;
          }
        } catch (err) {}
        return lastPanZoomState;
      }

      function restorePanZoomState(state) {
        if (!panZoom || !state) return false;
        try {
          if (isFinite(state.zoom)) panZoom.zoom(state.zoom);
          if (state.pan && isFinite(state.pan.x) && isFinite(state.pan.y)) {
            panZoom.pan({ x: state.pan.x, y: state.pan.y });
          }
          lastPanZoomState = {
            zoom: state.zoom,
            pan: { x: state.pan.x, y: state.pan.y }
          };
          return true;
        } catch (err) {
          return false;
        }
      }

      function tryInitPanZoom() {
        if (initialized) return;
        if (typeof window.svgPanZoom !== "function") {
          console.error("svg-pan-zoom not loaded.");
          return;
        }

        const vb = svg.viewBox.baseVal;
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!validBox(vb) || !cw || !ch) return;

        panZoom = svgPanZoom(svg, {
          viewportSelector: "#viewport",
          panEnabled: true,
          zoomEnabled: true,
          mouseWheelZoomEnabled: false,
          controlIconsEnabled: false,
          fit: false,
          center: true,
          minZoom: 0.25,
          maxZoom: 10,
          dblClickZoomEnabled: true,
          onUpdatedCTM: function () {}
        });

        window.panZoomInstance = panZoom;
        initialized = true;

        if (!restorePanZoomState(lastPanZoomState)) {
          fitToContainer();
        }

        wireWheelZoom();
        enablePointerPan();
        enablePinchZoom();
      }

      function refreshPanZoom(state = null, shouldFit = false) {
        if (!panZoom) {
          tryInitPanZoom();
          if (state && panZoom) restorePanZoomState(state);
          return;
        }

        try {
          panZoom.resize();
          panZoom.updateBBox();

          if (shouldFit) {
            fitToContainer();
          } else if (state) {
            restorePanZoomState(state);
          } else if (lastPanZoomState) {
            restorePanZoomState(lastPanZoomState);
          }
        } catch (err) {
          destroyPanZoom();
          tryInitPanZoom();
          if (state && panZoom) restorePanZoomState(state);
        }
      }

      function getCurrentFont() {
        const active = Array.from(fontOptions).find(opt => opt.classList.contains("active"));
        return active ? active.dataset.font : defaults.fontFamily;
      }

      function getFontLabel(fontValue) {
        const option = Array.from(fontOptions).find(opt => opt.dataset.font === fontValue);
        return option ? option.textContent.trim() : "Arial";
      }

      function setActiveFontOption(fontValue) {
        fontOptions.forEach(opt => opt.classList.toggle("active", opt.dataset.font === fontValue));
      }

      function applyFont(fontValue, shouldRender = true) {
        selectedFontPreview.textContent = getFontLabel(fontValue);
        selectedFontPreview.style.fontFamily = fontValue;
        document.documentElement.style.setProperty("--menu-font", fontValue);
        setActiveFontOption(fontValue);
        if (shouldRender) render(true);
      }

      function getMainRabbitSex() {
        const sex = getParam("sex").trim().toLowerCase();
        if (sex.startsWith("m") || sex === "buck") return "male";
        if (sex.startsWith("f") || sex === "doe") return "female";
        return "main";
      }

      function getBoxFill(sexType) {
        if (sexType === "main") {
          if (mainSexColorToggle.checked) {
            const mainSex = getMainRabbitSex();
            if (mainSex === "male") return maleBoxColor.value;
            if (mainSex === "female") return femaleBoxColor.value;
          }
          return mainBoxColor.value;
        }
        return sexType === "male" ? maleBoxColor.value : femaleBoxColor.value;
      }

      function getCanvas() {
        return layoutOrientation.value === "portrait"
          ? { width: 1275, height: 1650 }
          : { width: 1650, height: 1275 };
      }

      function getPrintTuning() {
        return layoutOrientation.value === "portrait"
          ? PRINT_TUNING.portrait
          : PRINT_TUNING.landscape;
      }

      function getLayoutMeta() {
        const canvas = getCanvas();
        const t = getPrintTuning();
        const M = t.borderMargin;

        if (layoutOrientation.value === "portrait") {
          return {
            canvas,
            border: { x: M, y: M, w: canvas.width - (M * 2), h: canvas.height - (M * 2) },
            header: { x: t.headerX, y: t.headerY, logoSize: 116, textScale: 1.0, textGap: 22 },
            tree: {
              left: t.treeLeft,
              top: t.treeTop,
              right: canvas.width - t.treeRightInset,
              bottom: t.treeBottom
            },
            footer: {
              x: t.footerX,
              y: t.footerY,
              right: canvas.width - t.footerX,
              taglineY: t.footerTaglineY
            },
            photoGap: 16,
            photoSize: { w: 176, h: 142 }
          };
        }

        return {
          canvas,
          border: { x: M, y: M, w: canvas.width - (M * 2), h: canvas.height - (M * 2) },
          header: { x: t.headerX, y: t.headerY, logoSize: 106, textScale: 1.0, textGap: 20 },
          tree: {
            left: t.treeLeft,
            top: t.treeTop,
            right: canvas.width - t.treeRightInset,
            bottom: t.treeBottom
          },
          footer: {
            x: t.footerX,
            y: t.footerY,
            right: canvas.width - t.footerX,
            taglineY: t.footerTaglineY
          },
          photoGap: 14,
          photoSize: { w: 184, h: 148 }
        };
      }

      function getPositions(boxW, boxH) {
        const meta = getLayoutMeta();
        const tree = meta.tree;
        const isPortrait = layoutOrientation.value === "portrait";

        const usableWidth = tree.right - tree.left;
        const gapX = Math.max(isPortrait ? 4 : 8, (usableWidth - (boxW * 4)) / 3);

        const x1 = tree.left;
        const x2 = x1 + boxW + gapX;
        const x3 = x2 + boxW + gapX;
        const x4 = x3 + boxW + gapX;

        const usableHeight = tree.bottom - tree.top;
        const gap4 = Math.max(isPortrait ? 4 : 6, (usableHeight - (boxH * 8)) / 7);

        const gen4 = [];
        for (let i = 0; i < 8; i++) {
          gen4.push(tree.top + i * (boxH + gap4));
        }

        const centerY = (boxTop) => boxTop + (boxH / 2);
        const topFromCenter = (center) => center - (boxH / 2);

        const ssireY = topFromCenter((centerY(gen4[0]) + centerY(gen4[1])) / 2);
        const sdamY  = topFromCenter((centerY(gen4[2]) + centerY(gen4[3])) / 2);
        const dsireY = topFromCenter((centerY(gen4[4]) + centerY(gen4[5])) / 2);
        const ddamY  = topFromCenter((centerY(gen4[6]) + centerY(gen4[7])) / 2);

        const sireY = topFromCenter((centerY(ssireY) + centerY(sdamY)) / 2);
        const damY  = topFromCenter((centerY(dsireY) + centerY(ddamY)) / 2);
        const mainY = topFromCenter((centerY(sireY) + centerY(damY)) / 2);

        return {
          main:   { x: x1, y: mainY },
          sire:   { x: x2, y: sireY },
          dam:    { x: x2, y: damY },
          ssire:  { x: x3, y: ssireY },
          sdam:   { x: x3, y: sdamY },
          dsire:  { x: x3, y: dsireY },
          ddam:   { x: x3, y: ddamY },
          sssire: { x: x4, y: gen4[0] },
          ssdam:  { x: x4, y: gen4[1] },
          sdsire: { x: x4, y: gen4[2] },
          sddam:  { x: x4, y: gen4[3] },
          dssire: { x: x4, y: gen4[4] },
          dsdam:  { x: x4, y: gen4[5] },
          ddsire: { x: x4, y: gen4[6] },
          dddam:  { x: x4, y: gen4[7] }
        };
      }

      function shouldShowField(label) {
        if (label === "DOB") return toggleShowDob.checked;
        if (label === "Ear Length") return toggleShowEarl.checked;
        return true;
      }

      function buildBoxText(def) {
        const lines = [];
        lines.push({ text: getChain(def.titleChain), type: "title" });

        def.fields.forEach(([label, key]) => {
          if (!shouldShowField(label)) return;
          lines.push({ text: `${label}: ${getParam(key)}`, type: "field" });
        });

        if (toggleShowCustom.checked) {
          def.extra.forEach(key => {
            const raw = getParam(key);
            if (!raw) return;
            raw.replace(/\\n/g, "\n").split("\n").forEach(line => {
              if (line.trim()) lines.push({ text: line.trim(), type: "extra" });
            });
          });
        }

        return lines;
      }

      function getLineRenderMetrics(line) {
        const bodySize = Number(boxBodyFontSizeInput.value);
        const nameSize = Number(boxNameFontSizeInput.value);

        if (line.type === "title") {
          return {
            fontSize: nameSize,
            lineHeight: Math.max(nameSize, bodySize + 1),
            weight: "700"
          };
        }

        return {
          fontSize: bodySize,
          lineHeight: Math.max(bodySize, 10),
          weight: "400"
        };
      }

      function fitTextLinesToBox(lines, boxH) {
        const topPadMin = 8;
        const bottomPadMin = 8;
        const usableH = boxH - topPadMin - bottomPadMin;

        let used = 0;
        const visible = [];

        for (const line of lines) {
          const metrics = getLineRenderMetrics(line);
          if (used + metrics.lineHeight > usableH) break;
          visible.push({ ...line, metrics });
          used += metrics.lineHeight;
        }

        const startY = Math.max(topPadMin, (boxH - used) / 2);
        return { visible, startY };
      }

      function drawWins(group, def, x, y, boxW, boxH) {
        if (!toggleShowWins.checked) return;
        if (def.gen >= 4 || !def.wins) return;

        const raw = getParam(def.wins);
        if (!raw) return;

        const lines = raw.replace(/\\n/g, "\n").split("\n").filter(Boolean);
        if (!lines.length) return;

        const size = Math.max(10, Number(boxBodyFontSizeInput.value));
        const textEl = makeEl("text", { x: x + 6, y: y + boxH + 16 });
        textEl.style.fontFamily = getCurrentFont();
        textEl.style.fill = fontColor.value;
        textEl.style.fontSize = size + "px";

        lines.slice(0, 3).forEach((line, i) => {
          const ts = makeEl("tspan", {
            x: x + 6,
            dy: i === 0 ? 0 : size + 2
          });
          ts.textContent = line;
          textEl.appendChild(ts);
        });

        group.appendChild(textEl);
      }

      function drawBox(group, winsLayer, def, x, y, boxW, boxH) {
        const fill = getBoxFill(def.sexType);

        group.appendChild(makeEl("rect", {
          x, y, width: boxW, height: boxH, rx: 8, ry: 8,
          fill, stroke: "#000000", "stroke-width": 1.1
        }));

        const textLines = buildBoxText(def);
        const fitted = fitTextLinesToBox(textLines, boxH);
        const padX = 8;

        const t = makeEl("text", {
          x: x + padX,
          y: y + fitted.startY
        });

        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.setAttribute("dominant-baseline", "hanging");

        let currentY = y + fitted.startY;

        fitted.visible.forEach((line) => {
          const ts = makeEl("tspan", {
            x: x + padX,
            y: currentY
          });
          ts.textContent = line.text;
          ts.style.fontSize = line.metrics.fontSize + "px";
          ts.style.fontWeight = line.metrics.weight;
          ts.setAttribute("dominant-baseline", "hanging");
          t.appendChild(ts);

          currentY += line.metrics.lineHeight;
        });

        group.appendChild(t);
        drawWins(winsLayer, def, x, y, boxW, boxH);
      }

      function drawLine(group, childPos, parentPos, boxW, boxH) {
        const stroke = lineColorInput.value;
        const sw = lineThicknessInput.value;
        const style = lineStyleInput.value;

        const p1 = { x: childPos.x + boxW, y: childPos.y + boxH / 2 };
        const p2 = { x: parentPos.x, y: parentPos.y + boxH / 2 };

        if (style === "diagonal") {
          group.appendChild(makeEl("line", {
            x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
            stroke, "stroke-width": sw
          }));
        } else {
          const midX = (p1.x + p2.x) / 2;
          group.appendChild(makeEl("path", {
            d: `M ${p1.x} ${p1.y} L ${midX} ${p1.y} L ${midX} ${p2.y} L ${p2.x} ${p2.y}`,
            fill: "none", stroke, "stroke-width": sw
          }));
        }
      }

      function addCircle(group, cx, cy, r, fill, stroke, sw) {
        group.appendChild(makeEl("circle", {
          cx, cy, r, fill, stroke, "stroke-width": sw
        }));
      }

      function addDiamond(group, cx, cy, w, h, fill, stroke, sw) {
        group.appendChild(makeEl("polygon", {
          points: `${cx},${cy-h/2} ${cx+w/2},${cy} ${cx},${cy+h/2} ${cx-w/2},${cy}`,
          fill, stroke, "stroke-width": sw
        }));
      }

      function addLine(group, x1, y1, x2, y2, stroke, sw) {
        group.appendChild(makeEl("line", { x1, y1, x2, y2, stroke, "stroke-width": sw }));
      }

      function addRect(group, x, y, width, height, stroke, sw, fill = "none", rx = 0, ry = 0) {
        group.appendChild(makeEl("rect", {
          x, y, width, height, fill, stroke, "stroke-width": sw, rx, ry
        }));
      }

      function addPath(group, d, stroke, sw, fill = "none") {
        group.appendChild(makeEl("path", { d, fill, stroke, "stroke-width": sw }));
      }

      function addPolyline(group, points, stroke, sw, fill = "none") {
        group.appendChild(makeEl("polyline", {
          points,
          fill,
          stroke,
          "stroke-width": sw
        }));
      }

      function drawCornerFlourish(group, x, y, primary, secondary, corner) {
        let sx = 1, sy = 1;
        if (corner === "tr") sx = -1;
        if (corner === "bl") sy = -1;
        if (corner === "br") { sx = -1; sy = -1; }

        const g = makeEl("g", { transform: `translate(${x},${y}) scale(${sx},${sy})` });

        addPath(g, `M 0 0 C 24 0, 42 2, 58 10 C 84 22, 98 40, 102 66 C 88 62, 75 58, 64 48 C 54 40, 46 28, 42 16 C 35 36, 22 54, 0 72`, primary, 3, "none");
        addPath(g, `M 14 14 C 30 12, 44 16, 58 24 C 72 32, 80 42, 82 58 C 72 52, 62 48, 54 40 C 44 31, 36 22, 32 14`, secondary, 2, "none");

        addCircle(g, 22, 22, 4.5, secondary, primary, 1.5);
        addCircle(g, 58, 24, 3.6, secondary, primary, 1.2);
        addCircle(g, 80, 58, 3.6, secondary, primary, 1.2);

        group.appendChild(g);
      }

      function drawMedallion(group, cx, cy, r, primary, secondary) {
        for (let i = 0; i < 16; i++) {
          const a = (Math.PI * 2 * i) / 16;
          const px = cx + Math.cos(a) * (r * 1.15);
          const py = cy + Math.sin(a) * (r * 1.15);
          addCircle(group, px, py, r * 0.18, secondary, primary, 1);
        }
        addCircle(group, cx, cy, r, "none", primary, 2.2);
        addCircle(group, cx, cy, r * 0.73, secondary, primary, 1.8);
        addDiamond(group, cx, cy, r * 0.78, r * 0.78, "none", primary, 1.2);
        addCircle(group, cx, cy, r * 0.12, primary, primary, 1);
      }

      function drawRibbonCrest(group, cx, y, width, height, primary, secondary) {
        const left = cx - width / 2;
        const right = cx + width / 2;
        const midY = y + height / 2;

        group.appendChild(makeEl("path", {
          d: `M ${left+18} ${y} L ${right-18} ${y} Q ${right} ${y} ${right} ${y+18} L ${right} ${y+height-18} Q ${right} ${y+height} ${right-18} ${y+height} L ${left+18} ${y+height} Q ${left} ${y+height} ${left} ${y+height-18} L ${left} ${y+18} Q ${left} ${y} ${left+18} ${y} Z`,
          fill: secondary,
          stroke: primary,
          "stroke-width": 3
        }));

        group.appendChild(makeEl("polygon", {
          points: `${left} ${midY} ${left-34} ${y+8} ${left-34} ${y+height-8}`,
          fill: secondary, stroke: primary, "stroke-width": 3
        }));

        group.appendChild(makeEl("polygon", {
          points: `${right} ${midY} ${right+34} ${y+8} ${right+34} ${y+height-8}`,
          fill: secondary, stroke: primary, "stroke-width": 3
        }));

        addLine(group, left + 18, midY, right - 18, midY, primary, 1.5);
        drawMedallion(group, cx, midY, 12, primary, secondary);
      }

      function drawLaurelSprig(group, x, y, primary, secondary, flipX = 1) {
        const g = makeEl("g", { transform: `translate(${x},${y}) scale(${flipX},1)` });
        addPath(g, `M 0 52 C 18 40, 28 26, 42 0`, primary, 2.2);

        [[10, 42, 12, -20],[18, 34, 12, -16],[26, 25, 11, -12],[34, 15, 10, -8]].forEach(([lx, ly, s, rot]) => {
          g.appendChild(makeEl("ellipse", {
            cx: lx, cy: ly, rx: s, ry: s * 0.45,
            fill: secondary, stroke: primary, "stroke-width": 1.5,
            transform: `rotate(${rot} ${lx} ${ly})`
          }));
        });

        group.appendChild(g);
      }

      function drawScallopBand(group, x, y, w, h, primary, secondary) {
        const step = 28;
        const r = 9;

        for (let px = x + 34; px < x + w - 34; px += step) {
          addCircle(group, px, y, r, "#fff", secondary, 1.8);
          addCircle(group, px, y + h, r, "#fff", secondary, 1.8);
        }

        for (let py = y + 34; py < y + h - 34; py += step) {
          addCircle(group, x, py, r, "#fff", secondary, 1.8);
          addCircle(group, x + w, py, r, "#fff", secondary, 1.8);
        }

        addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 2.2);
      }

      function drawRosette(group, cx, cy, r, primary, secondary) {
        for (let i = 0; i < 12; i++) {
          const a = (Math.PI * 2 * i) / 12;
          const px = cx + Math.cos(a) * (r * 1.1);
          const py = cy + Math.sin(a) * (r * 1.1);
          addCircle(group, px, py, r * 0.34, secondary, primary, 1);
        }
        addCircle(group, cx, cy, r * 0.65, secondary, primary, 2);
      }

      function drawLeaf(group, x, y, scale, primary, secondary, flipX = 1) {
        const g = makeEl("g", { transform: `translate(${x},${y}) scale(${flipX},1)` });
        g.appendChild(makeEl("path", {
          d: `M 0 0 C 18 -16, 36 -16, 48 0 C 36 16, 18 16, 0 0 Z`,
          fill: secondary, stroke: primary, "stroke-width": 2,
          transform: `scale(${scale})`
        }));
        g.appendChild(makeEl("path", {
          d: `M 4 0 L 44 0`,
          fill: "none", stroke: primary, "stroke-width": 1.6,
          transform: `scale(${scale})`
        }));
        group.appendChild(g);
      }

      function drawBeadLine(group, x1, y1, x2, y2, count, r, fill, stroke, sw) {
        for (let i = 0; i <= count; i++) {
          const t = i / count;
          const cx = x1 + (x2 - x1) * t;
          const cy = y1 + (y2 - y1) * t;
          addCircle(group, cx, cy, r, fill, stroke, sw);
        }
      }

      function drawCornerShell(group, x, y, primary, secondary, corner) {
        let sx = 1, sy = 1;
        if (corner === "tr") sx = -1;
        if (corner === "bl") sy = -1;
        if (corner === "br") { sx = -1; sy = -1; }

        const g = makeEl("g", { transform: `translate(${x},${y}) scale(${sx},${sy})` });

        addPath(g, `M 0 0 Q 18 0 32 10 Q 48 22 58 40 Q 66 54 70 74`, primary, 3);
        addPath(g, `M 8 8 Q 22 8 34 16 Q 46 26 54 40 Q 58 48 61 60`, secondary, 2);
        addPath(g, `M 14 18 Q 24 18 33 24 Q 42 31 48 42`, secondary, 1.5);
        addCircle(g, 18, 18, 3.5, secondary, primary, 1.1);
        addCircle(g, 34, 26, 3, secondary, primary, 1);
        addCircle(g, 48, 42, 2.8, secondary, primary, 1);

        group.appendChild(g);
      }

      function drawFretBand(group, x, y, w, h, primary, secondary) {
        const step = 44;

        for (let px = x + 24; px < x + w - 24; px += step) {
          addPolyline(group, `${px} ${y} ${px+10} ${y} ${px+10} ${y+10} ${px+22} ${y+10} ${px+22} ${y} ${px+32} ${y}`, primary, 2);
          addPolyline(group, `${px} ${y+h} ${px+10} ${y+h} ${px+10} ${y+h-10} ${px+22} ${y+h-10} ${px+22} ${y+h} ${px+32} ${y+h}`, primary, 2);
        }

        for (let py = y + 24; py < y + h - 24; py += step) {
          addPolyline(group, `${x} ${py} ${x} ${py+10} ${x+10} ${py+10} ${x+10} ${py+22} ${x} ${py+22} ${x} ${py+32}`, primary, 2);
          addPolyline(group, `${x+w} ${py} ${x+w} ${py+10} ${x+w-10} ${py+10} ${x+w-10} ${py+22} ${x+w} ${py+22} ${x+w} ${py+32}`, primary, 2);
        }

        addRect(group, x + 10, y + 10, w - 20, h - 20, secondary, 1.7);
      }

      function drawSideVine(group, x, y1, y2, primary, secondary, flipX = 1) {
        const g = makeEl("g", { transform: `translate(${x},0) scale(${flipX},1)` });

        addPath(g, `M 0 ${y1} C 18 ${y1+30}, 18 ${y1+70}, 0 ${y1+100}
                       C -18 ${y1+130}, -18 ${y1+170}, 0 ${y1+200}
                       C 18 ${y1+230}, 18 ${y2-30}, 0 ${y2}`, primary, 2.4);

        for (let py = y1 + 28; py < y2 - 20; py += 42) {
          g.appendChild(makeEl("ellipse", {
            cx: 12, cy: py, rx: 12, ry: 5.5,
            fill: secondary, stroke: primary, "stroke-width": 1.4,
            transform: `rotate(-28 12 ${py})`
          }));
          g.appendChild(makeEl("ellipse", {
            cx: -12, cy: py + 16, rx: 12, ry: 5.5,
            fill: secondary, stroke: primary, "stroke-width": 1.4,
            transform: `rotate(28 -12 ${py + 16})`
          }));
          addCircle(g, 0, py + 8, 2.6, secondary, primary, 1);
        }

        group.appendChild(g);
      }

      function drawBannerPlate(group, cx, y, w, h, primary, secondary) {
        const x = cx - w / 2;
        const midY = y + h / 2;

        group.appendChild(makeEl("path", {
          d: `M ${x+20} ${y} L ${x+w-20} ${y} Q ${x+w} ${y} ${x+w} ${y+18}
              L ${x+w} ${y+h-18} Q ${x+w} ${y+h} ${x+w-20} ${y+h}
              L ${x+20} ${y+h} Q ${x} ${y+h} ${x} ${y+h-18}
              L ${x} ${y+18} Q ${x} ${y} ${x+20} ${y} Z`,
          fill: "#ffffff",
          stroke: primary,
          "stroke-width": 3
        }));

        group.appendChild(makeEl("polygon", {
          points: `${x} ${midY} ${x-28} ${y+8} ${x-28} ${y+h-8}`,
          fill: secondary, stroke: primary, "stroke-width": 2.4
        }));

        group.appendChild(makeEl("polygon", {
          points: `${x+w} ${midY} ${x+w+28} ${y+8} ${x+w+28} ${y+h-8}`,
          fill: secondary, stroke: primary, "stroke-width": 2.4
        }));

        addLine(group, x + 18, midY, x + w - 18, midY, secondary, 1.5);
        addDiamond(group, cx, midY, 18, 18, secondary, primary, 1.3);
      }

      function drawPetalMedallion(group, cx, cy, r, primary, secondary) {
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 * i) / 8;
          const px = cx + Math.cos(a) * (r * 0.82);
          const py = cy + Math.sin(a) * (r * 0.82);
          group.appendChild(makeEl("ellipse", {
            cx: px, cy: py, rx: r * 0.34, ry: r * 0.18,
            fill: secondary, stroke: primary, "stroke-width": 1.2,
            transform: `rotate(${(a * 180 / Math.PI)} ${px} ${py})`
          }));
        }
        addCircle(group, cx, cy, r * 0.48, "#ffffff", primary, 1.8);
        addCircle(group, cx, cy, r * 0.15, primary, primary, 1);
      }

      function drawBracketCorners(group, x, y, w, h, primary, secondary) {
        const s = 32;

        [
          [x, y, 1, 1],
          [x+w, y, -1, 1],
          [x, y+h, 1, -1],
          [x+w, y+h, -1, -1]
        ].forEach(([cx, cy, sx, sy]) => {
          const g = makeEl("g", { transform: `translate(${cx},${cy}) scale(${sx},${sy})` });
          addLine(g, 0, 0, s, 0, primary, 3);
          addLine(g, 0, 0, 0, s, primary, 3);
          addLine(g, 12, 12, s - 4, 12, secondary, 1.5);
          addLine(g, 12, 12, 12, s - 4, secondary, 1.5);
          group.appendChild(g);
        });
      }

      function drawSunburst(group, cx, cy, r, primary, secondary) {
        for (let i = 0; i < 20; i++) {
          const a = (Math.PI * 2 * i) / 20;
          const x1 = cx + Math.cos(a) * (r * 0.95);
          const y1 = cy + Math.sin(a) * (r * 0.95);
          const x2 = cx + Math.cos(a) * (r * 1.45);
          const y2 = cy + Math.sin(a) * (r * 1.45);
          addLine(group, x1, y1, x2, y2, secondary, 1.2);
        }
        addCircle(group, cx, cy, r, "#ffffff", primary, 2.3);
        addDiamond(group, cx, cy, r * 0.8, r * 0.8, secondary, primary, 1.2);
        addCircle(group, cx, cy, r * 0.16, primary, primary, 1);
      }

      function drawNotchTicks(group, x, y, w, h, primary) {
        const step = 36;

        for (let px = x + 22; px < x + w - 22; px += step) {
          addLine(group, px, y, px + 10, y + 10, primary, 1.2);
          addLine(group, px, y + h, px + 10, y + h - 10, primary, 1.2);
        }

        for (let py = y + 22; py < y + h - 22; py += step) {
          addLine(group, x, py, x + 10, py + 10, primary, 1.2);
          addLine(group, x + w, py, x + w - 10, py + 10, primary, 1.2);
        }
      }

      function drawBorder(group, meta) {
        const style = borderStyleInput.value;
        const primary = borderPrimaryColor.value;
        const secondary = borderSecondaryColor.value;
        const b = meta.border;
        const x = b.x;
        const y = b.y;
        const w = b.w;
        const h = b.h;
        const cx = x + w / 2;
        const cy = y + h / 2;

        group.appendChild(makeEl("rect", {
          x: 0, y: 0, width: meta.canvas.width, height: meta.canvas.height, fill: "#ffffff"
        }));

        switch (style) {
          case "classicDouble":
            addRect(group, x, y, w, h, primary, 8);
            addRect(group, x + 14, y + 14, w - 28, h - 28, secondary, 3);
            addRect(group, x + 28, y + 28, w - 56, h - 56, primary, 1.8);
            addRect(group, x + 42, y + 42, w - 84, h - 84, secondary, 1.1);
            drawBeadLine(group, x + 70, y + 20, x + w - 70, y + 20, 26, 2.8, secondary, primary, 0.8);
            drawBeadLine(group, x + 70, y + h - 20, x + w - 70, y + h - 20, 26, 2.8, secondary, primary, 0.8);
            drawBeadLine(group, x + 20, y + 70, x + 20, y + h - 70, 18, 2.8, secondary, primary, 0.8);
            drawBeadLine(group, x + w - 20, y + 70, x + w - 20, y + h - 70, 18, 2.8, secondary, primary, 0.8);
            drawPetalMedallion(group, x + 54, y + 54, 15, primary, secondary);
            drawPetalMedallion(group, x + w - 54, y + 54, 15, primary, secondary);
            drawPetalMedallion(group, x + 54, y + h - 54, 15, primary, secondary);
            drawPetalMedallion(group, x + w - 54, y + h - 54, 15, primary, secondary);
            break;

          case "elegantCorners":
            addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 4.5);
            addRect(group, x + 28, y + 28, w - 56, h - 56, secondary, 2.2);
            addRect(group, x + 44, y + 44, w - 88, h - 88, primary, 1.1);
            drawCornerFlourish(group, x + 28, y + 28, primary, secondary, "tl");
            drawCornerFlourish(group, x + w - 28, y + 28, primary, secondary, "tr");
            drawCornerFlourish(group, x + 28, y + h - 28, primary, secondary, "bl");
            drawCornerFlourish(group, x + w - 28, y + h - 28, primary, secondary, "br");
            drawCornerShell(group, x + 72, y + 72, primary, secondary, "tl");
            drawCornerShell(group, x + w - 72, y + 72, primary, secondary, "tr");
            drawCornerShell(group, x + 72, y + h - 72, primary, secondary, "bl");
            drawCornerShell(group, x + w - 72, y + h - 72, primary, secondary, "br");
            break;

          case "ribbonFrame":
            addRect(group, x + 16, y + 18, w - 32, h - 36, primary, 5.5);
            addRect(group, x + 34, y + 36, w - 68, h - 72, secondary, 2.5);
            addRect(group, x + 50, y + 52, w - 100, h - 104, primary, 1.2);
            drawRibbonCrest(group, cx, y + 18, 270, 48, primary, secondary);
            drawBannerPlate(group, cx, y + h - 64, 250, 42, primary, secondary);
            drawPetalMedallion(group, x + 66, y + 44, 11, primary, secondary);
            drawPetalMedallion(group, x + w - 66, y + 44, 11, primary, secondary);
            break;

          case "royalArch":
            addRect(group, x + 18, y + 50, w - 36, h - 66, primary, 5);
            addRect(group, x + 36, y + 68, w - 72, h - 102, secondary, 2.2);
            addPath(group, `M ${x+120} ${y+50} Q ${cx} ${y-46} ${x+w-120} ${y+50}`, primary, 6);
            addPath(group, `M ${x+158} ${y+66} Q ${cx} ${y+2} ${x+w-158} ${y+66}`, secondary, 2.6);
            drawSunburst(group, cx, y + 28, 14, primary, secondary);
            drawLaurelSprig(group, cx - 54, y + 42, primary, secondary, -1);
            drawLaurelSprig(group, cx + 54, y + 42, primary, secondary, 1);
            addLine(group, x + 70, y + 50, x + 70, y + h - 18, secondary, 1.2);
            addLine(group, x + w - 70, y + 50, x + w - 70, y + h - 18, secondary, 1.2);
            break;

          case "modernGeo":
            addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 4.5);
            addRect(group, x + 28, y + 28, w - 56, h - 56, secondary, 2.2);
            addRect(group, x + 42, y + 42, w - 84, h - 84, primary, 1.2);
            drawFretBand(group, x + 18, y + 18, w - 36, h - 36, primary, secondary);
            drawBracketCorners(group, x + 24, y + 24, w - 48, h - 48, primary, secondary);
            addDiamond(group, cx, y + 30, 18, 18, secondary, primary, 1.2);
            addDiamond(group, cx, y + h - 30, 18, 18, secondary, primary, 1.2);
            break;

          case "scallop":
            drawScallopBand(group, x + 14, y + 14, w - 28, h - 28, primary, secondary);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2.1);
            addRect(group, x + 48, y + 48, w - 96, h - 96, primary, 1.1);
            drawBeadLine(group, x + 54, y + 54, x + w - 54, y + 54, 22, 2.2, secondary, primary, 0.8);
            drawBeadLine(group, x + 54, y + h - 54, x + w - 54, y + h - 54, 22, 2.2, secondary, primary, 0.8);
            drawPetalMedallion(group, x + 54, y + 54, 10, primary, secondary);
            drawPetalMedallion(group, x + w - 54, y + 54, 10, primary, secondary);
            drawPetalMedallion(group, x + 54, y + h - 54, 10, primary, secondary);
            drawPetalMedallion(group, x + w - 54, y + h - 54, 10, primary, secondary);
            break;

          case "ornateLines":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4);
            addRect(group, x + 32, y + 32, w - 64, h - 64, secondary, 1.8);
            addRect(group, x + 46, y + 46, w - 92, h - 92, primary, 1);
            drawCornerFlourish(group, x + 24, y + 24, primary, secondary, "tl");
            drawCornerFlourish(group, x + w - 24, y + 24, primary, secondary, "tr");
            drawCornerFlourish(group, x + 24, y + h - 24, primary, secondary, "bl");
            drawCornerFlourish(group, x + w - 24, y + h - 24, primary, secondary, "br");
            addPath(group, `M ${x+120} ${y+26} C ${cx-180} ${y+34}, ${cx-80} ${y+8}, ${cx} ${y+26}
                            C ${cx+80} ${y+44}, ${cx+180} ${y+18}, ${x+w-120} ${y+26}`, secondary, 2.2);
            addPath(group, `M ${x+120} ${y+h-26} C ${cx-180} ${y+h-34}, ${cx-80} ${y+h-8}, ${cx} ${y+h-26}
                            C ${cx+80} ${y+h-44}, ${cx+180} ${y+h-18}, ${x+w-120} ${y+h-26}`, secondary, 2.2);
            break;

          case "ticketEdge":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4.5, "none", 22, 22);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2.1, "none", 14, 14);
            addRect(group, x + 48, y + 48, w - 96, h - 96, primary, 1.1, "none", 8, 8);
            drawBannerPlate(group, cx, y + 18, 240, 42, primary, secondary);
            drawNotchTicks(group, x + 18, y + 18, w - 36, h - 36, secondary);
            addDiamond(group, x + 52, cy, 16, 16, secondary, primary, 1.1);
            addDiamond(group, x + w - 52, cy, 16, 16, secondary, primary, 1.1);
            break;

          case "floralLite":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2);
            addRect(group, x + 50, y + 50, w - 100, h - 100, primary, 1.1);
            drawSideVine(group, x + 28, y + 72, y + h - 72, primary, secondary, 1);
            drawSideVine(group, x + w - 28, y + 72, y + h - 72, primary, secondary, -1);
            drawLeaf(group, cx - 32, y + 34, 1.0, primary, secondary, 1);
            drawLeaf(group, cx + 32, y + 34, 1.0, primary, secondary, -1);
            drawPetalMedallion(group, cx, y + 34, 10, primary, secondary);
            drawLeaf(group, cx - 32, y + h - 34, 1.0, primary, secondary, 1);
            drawLeaf(group, cx + 32, y + h - 34, 1.0, primary, secondary, -1);
            drawPetalMedallion(group, cx, y + h - 34, 10, primary, secondary);
            break;

          case "showFrame":
            addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 7);
            addRect(group, x + 24, y + 24, w - 48, h - 48, secondary, 2.8);
            addRect(group, x + 40, y + 40, w - 80, h - 80, primary, 1.2);
            drawRibbonCrest(group, cx, y + 18, 250, 44, primary, secondary);
            drawBannerPlate(group, cx, y + h - 60, 230, 40, primary, secondary);
            drawRosette(group, x + 54, y + 54, 18, primary, secondary);
            drawRosette(group, x + w - 54, y + 54, 18, primary, secondary);
            drawRosette(group, x + 54, y + h - 54, 18, primary, secondary);
            drawRosette(group, x + w - 54, y + h - 54, 18, primary, secondary);
            drawSunburst(group, cx, y + 46, 11, primary, secondary);
            break;
        }
      }

      function getCurrentSettings() {
        return {
          borderStyle: borderStyleInput.value,
          borderColorPreset: borderColorPreset.value,
          borderPrimary: borderPrimaryColor.value,
          borderSecondary: borderSecondaryColor.value,
          preset: colorPreset.value,
          mainSexColor: mainSexColorToggle.checked,
          main: mainBoxColor.value,
          male: maleBoxColor.value,
          female: femaleBoxColor.value,
          showDob: toggleShowDob.checked,
          showEarl: toggleShowEarl.checked,
          showCustom: toggleShowCustom.checked,
          showWins: toggleShowWins.checked,
          fontColor: fontColor.value,
          fontFamily: getCurrentFont(),
          layout: layoutOrientation.value,
          boxWidth: Number(boxWidthInput.value),
          boxHeight: Number(boxHeightInput.value),
          nameFont: Number(boxNameFontSizeInput.value),
          bodyFont: Number(boxBodyFontSizeInput.value),
          lineStyle: lineStyleInput.value,
          lineColor: lineColorInput.value,
          lineThickness: Number(lineThicknessInput.value),
          watermarkEnabled: toggleWatermark.checked,
          watermarkOpacity: Number(watermarkOpacity.value),
          watermarkSize: Number(watermarkSize.value),
          rabbitPhotoEnabled: toggleRabbitPhoto.checked
        };
      }

      function applySettings(settings, shouldRender = true) {
        if (!settings || typeof settings !== "object") return;

        if (settings.borderStyle) borderStyleInput.value = settings.borderStyle;
        if (settings.borderColorPreset != null) borderColorPreset.value = settings.borderColorPreset;
        if (settings.borderPrimary) borderPrimaryColor.value = settings.borderPrimary;
        if (settings.borderSecondary) borderSecondaryColor.value = settings.borderSecondary;

      async function saveSettingsToShowTails() {
        const settings = getCurrentSettings();
        const email = getParam("email").trim();

        if (!email) {
          saveStatus.textContent = "Unable to save: missing email address.";
          return;
        }

        saveStatus.textContent = "Saving settings...";
        saveBtn.disabled = true;

        try {
          const response = await fetch(SAVE_SETTINGS_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email,
              savedPedigreeSettings: JSON.stringify(settings)
            })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          saveStatus.textContent = "Settings saved.";

          try {
            const url = new URL(window.location.href);
            url.searchParams.set("saved", JSON.stringify(settings));

      async function inlineExternalImagesForExport(targetSvg) {
        const imageNodes = Array.from(targetSvg.querySelectorAll("image"));
        const promises = imageNodes.map((img) => {
          const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
          if (!href || href.startsWith("data:")) return Promise.resolve();

          return fetch(href, { mode: "cors" })
            .then(res => {
              if (!res.ok) throw new Error("Image fetch failed");
              return res.blob();
            })
            .then(blob => new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => {
                img.setAttribute("href", reader.result);
                img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", reader.result);
                resolve();
              };
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            }))
            .catch(() => {});
        });

        return Promise.all(promises);
      }

      async function buildStaticExportSvg() {
        const svgClone = svg.cloneNode(true);
        svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        svgClone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

        const vb = svg.getAttribute("viewBox");
        if (vb) svgClone.setAttribute("viewBox", vb);

        const canvas = getCanvas();
        svgClone.setAttribute("width", String(canvas.width));
        svgClone.setAttribute("height", String(canvas.height));
        svgClone.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const vp = svgClone.querySelector("#viewport");
        if (vp) {
          vp.removeAttribute("transform");
          vp.style.transform = "none";
        }

        svgClone.style.transform = "none";
        svgClone.style.background = "#ffffff";
        svgClone.style.display = "block";

        await inlineExternalImagesForExport(svgClone);
        return svgClone;
      }

      async function buildPrintImageDataUrl() {
        const svgClone = await buildStaticExportSvg();
        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svgClone);
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const canvasSize = getCanvas();
        const exportScale = 2;

        return await new Promise((resolve, reject) => {
          const img = new Image();

          img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = canvasSize.width * exportScale;
            canvas.height = canvasSize.height * exportScale;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL("image/png"));
          };

          img.onerror = function () {
            URL.revokeObjectURL(url);
            reject(new Error("Unable to rasterize print image."));
          };

          img.src = url;
        });
      }

      function getFileBaseName() {
        return (getParam("name") || "pedigree")
          .replace(/[^\w\-]+/g, "_")
          .replace(/^_+|_+$/g, "") || "pedigree";
      }

      async function saveSvgFile() {
        saveStatus.textContent = "Preparing SVG...";
        try {
          const serializer = new XMLSerializer();
          const svgClone = await buildStaticExportSvg();
          const svgString = serializer.serializeToString(svgClone);
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = `${getFileBaseName()}.svg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          setTimeout(() => URL.revokeObjectURL(url), 1000);
          saveStatus.textContent = "SVG saved.";
        } catch (err) {
          saveStatus.textContent = "Unable to save SVG.";
        }
      }

      async function saveSvgAsPng() {
        saveStatus.textContent = "Preparing PNG...";
        try {
          const serializer = new XMLSerializer();
          const svgClone = await buildStaticExportSvg();
          const svgString = serializer.serializeToString(svgClone);
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);

          const canvasSize = getCanvas();
          const exportScale = 2;

          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = canvasSize.width * exportScale;
            canvas.height = canvasSize.height * exportScale;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            URL.revokeObjectURL(url);

            canvas.toBlob(function (pngBlob) {
              if (!pngBlob) {
                saveStatus.textContent = "Could not create PNG.";
                return;
              }

              const a = document.createElement("a");
              const pngUrl = URL.createObjectURL(pngBlob);

              a.href = pngUrl;
              a.download = `${getFileBaseName()}.png`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);

              setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
              saveStatus.textContent = "PNG saved.";
            }, "image/png");
          };

          img.onerror = function () {
            URL.revokeObjectURL(url);
            saveStatus.textContent = "Unable to save PNG. One or more external images may be blocking export.";
          };

          img.src = url;
        } catch (err) {
          saveStatus.textContent = "Unable to save PNG.";
        }
      }

      async function runPrintFlow() {
        const status = document.getElementById("save-status");
        if (status) status.textContent = "Preparing full-page print...";

        try {
          const isPortrait = document.getElementById("layout-orientation").value === "portrait";
          const printImageUrl = await buildPrintImageDataUrl();

          const pWin = window.open("", "_blank");
          if (!pWin) {
            if (status) status.textContent = "Please allow pop-ups to print.";
            return;
          }

          pWin.document.open();
          pWin.document.write(`
            <!DOCTYPE html>
            <html>
              <head>
                <meta charset="utf-8">

                <title>Rabbit Pedigree Print</title>

      function wireWheelZoom() {
        if (wheelWired) return;

        container.addEventListener("wheel", (e) => {
          if (!panZoom) return;
          const rect = svg.getBoundingClientRect();
          const point = { x: e.clientX - rect.left, y: e.clientY - rect.top };
          const factor = e.deltaY > 0 ? 0.9 : 1.1;
          e.preventDefault();
          if (isFinite(point.x) && isFinite(point.y)) {
            panZoom.zoomAtPoint(factor, point);
            capturePanZoomState();
          }
        }, { passive: false });

        wheelWired = true;
      }

      function enablePointerPan() {
        if (pointerWired) return;

        let isPanning = false;
        let start = { x: 0, y: 0 };

        svg.addEventListener("pointerdown", (e) => {
          isPanning = true;
          start = { x: e.clientX, y: e.clientY };
          if (svg.setPointerCapture) svg.setPointerCapture(e.pointerId);
        });

        svg.addEventListener("pointermove", (e) => {
          if (!isPanning || !panZoom) return;
          const dx = e.clientX - start.x;
          const dy = e.clientY - start.y;
          panZoom.panBy({ x: dx, y: dy });
          start = { x: e.clientX, y: e.clientY };
          capturePanZoomState();
        });

        svg.addEventListener("pointerup", () => {
          isPanning = false;
          capturePanZoomState();
        });

        svg.addEventListener("pointercancel", () => {
          isPanning = false;
          capturePanZoomState();
        });

        pointerWired = true;
      }

      function enablePinchZoom() {
        if (pinchWired) return;

        let pinchStart = null;
        let startZoom = 1;

        svg.addEventListener("touchstart", (e) => {
          if (e.touches.length === 2 && panZoom) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStart = Math.hypot(dx, dy);
            startZoom = panZoom.getZoom();
          }
        }, { passive: false });

        svg.addEventListener("touchmove", (e) => {
          if (e.touches.length === 2 && panZoom && pinchStart) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const pinchNow = Math.hypot(dx, dy);
            const zoomRatio = pinchNow / pinchStart;

            const rect = svg.getBoundingClientRect();
            const mid = {
              x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
              y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
            };

            panZoom.zoomAtPoint(startZoom * zoomRatio, mid);
            capturePanZoomState();
          }
        }, { passive: false });

        svg.addEventListener("touchend", () => {
          pinchStart = null;
          capturePanZoomState();
        });

        pinchWired = true;
      }

        });
      });

      saveBtn.addEventListener("click", saveSettingsToShowTails);
      resetStylesBtn.addEventListener("click", () => resetDefaults(true));
      printBtn.addEventListener("click", runPrintFlow);
      imageBtn.addEventListener("click", saveSvgAsPng);
      svgBtn.addEventListener("click", saveSvgFile);

      let lastContainerSize = {
        width: 0,
        height: 0
      };

      const ro = new ResizeObserver(() => {
        const width = container.clientWidth;
        const height = container.clientHeight;

        if (!width || !height) return;

        const sizeChanged =
          width !== lastContainerSize.width ||
          height !== lastContainerSize.height;

        lastContainerSize = { width, height };

        if (!sizeChanged) return;
        if (suppressAutoFit) return;

        const state = capturePanZoomState();

        if (!initialized) {
          tryInitPanZoom();
          return;
        }

        try {
          panZoom.resize();
          panZoom.updateBBox();

          if (!restorePanZoomState(state)) {
            fitToContainer();
          }
        } catch (err) {
          destroyPanZoom();
          tryInitPanZoom();
        }
      });
      ro.observe(container);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible") return;

        const state = capturePanZoomState();

        if (!initialized) {
          tryInitPanZoom();
          return;
        }

        try {
          panZoom.resize();
          panZoom.updateBBox();
          if (!restorePanZoomState(state)) {
            fitToContainer();
          }
        } catch (err) {
          destroyPanZoom();
          tryInitPanZoom();
        }
      });

      window.addEventListener("load", () => {
        refreshParams();
        loadPackedParams();
        resetDefaults(false);

        const savedSettings = getSavedSettingsFromUrl();
        if (savedSettings) {
          applySettings(savedSettings, false);
        }

        render(false);
      });
    })();
  </script>
</body>
</html>
